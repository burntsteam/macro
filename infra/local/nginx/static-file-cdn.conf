server {
    listen 80;

    # Match CloudFront response headers for /file/* routes
    location /file/ {
        proxy_pass http://localstack:4566/static-file-storage/file/;
        proxy_set_header Host localhost:4566;

        # CloudFront-like headers
        add_header Cross-Origin-Resource-Policy "cross-origin" always;
        add_header Content-Security-Policy "default-src 'none'; style-src 'unsafe-inline'; img-src data:;" always;
    }

    # /api/* -> static_file_service (no caching)
    location /api/ {
        proxy_pass http://static_file_service:8080/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # /internal/* -> static_file_service (no caching)
    location /internal/ {
        proxy_pass http://static_file_service:8080/internal/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Default -> S3 bucket root
    location / {
        proxy_pass http://localstack:4566/static-file-storage/;
        proxy_set_header Host localhost:4566;
    }
}
