[#setting url_escaping_charset="UTF-8"]
<!DOCTYPE html>
<html lang="en" xmlns:v="urn:schemas-microsoft-com:vml">
<head>
  <meta charset="utf-8" />
  <meta name="x-apple-disable-message-reformatting" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta
    name="format-detection"
    content="telephone=no, date=no, address=no, email=no"
  />
  <meta name="color-scheme" content="dark" />
  <meta name="supported-color-schemes" content="dark" />
  <title>Macro Access Code</title>
  <!--[if mso]><style>body{font-family:Helvetica,Arial,sans-serif}</style><![endif]-->
</head>

<body>
<div
  role="article"
  aria-roledescription="email"
  aria-label="Macro Access Code"
  lang="en"
  style="background-color: #030303; width: 100%; font-family: 'Rajdhani', Helvetica, Arial, sans-serif"
>
  <table
    cellpadding="0"
    cellspacing="0"
    role="presentation"
    style="width: 100%; max-width: 640px; margin: 0 auto; background-color: #030303"
  >
    <tr>
      <td align="center" style="padding: 56px 0 32px">
        <a href="https://macro.com">
          <img
            src="https://macro.com/logo-256px.png"
            width="128"
            alt="Macro"
            style="border: 0; max-width: 100%"
          />
        </a>
      </td>
    </tr>
    <tr>
      <td>
        <div style="background-color: #090909; border-radius: 5px; padding: 56px 40px; margin: 0 16px; border: 1px solid #484848">
          <h1
            style="
                    margin: 0 0 16px;
                    text-align: center;
                    font-size: 36px;
                    font-weight: 450;
                    font-family: 'Roboto Slab', Rockwell, Georgia, serif;
                    letter-spacing: -0.02em;
                    color: #f2f2f2;
                  "
          >
            Login to Macro
          </h1>
          <p
            style="
                    margin: 0;
                    text-align: center;
                    font-size: 16px;
                    color: #aeaeae;
                    font-family: 'Rajdhani', Helvetica, Arial, sans-serif;
                  "
          >
            Enter the code below to login.
          </p>
          <div style="margin: 56px auto; width: calc(100% - 64px); max-width: 400px; border-radius: 5px; background-color: #1f1f1f; padding: 32px; text-align: center; font-size: 48px; letter-spacing: 0.2em; color: #ff8f00; font-family: 'Courier New', Courier, monospace; border: 1px solid #484848; box-sizing: border-box">
            ${code}
          </div>
          <p
            style="
                    text-align: center;
                    font-size: 16px;
                    color: #aeaeae;
                    font-family: 'Rajdhani', Helvetica, Arial, sans-serif;
                  "
          >
            If you didn't request this, you can safely ignore this email.
          </p>
        </div>
      </td>
    </tr>
    <tr>
      <td style="padding: 48px 0; text-align: center">
        <p
          style="
                  margin: 0;
                  font-size: 14px;
                  color: #484848;
                  font-family: 'Rajdhani', Helvetica, Arial, sans-serif;
                "
        >
          Questions? Email us at
          <a
            href="mailto:support@macro.com"
            style="color: #aeaeae; text-decoration: none"
          >support@macro.com</a
          >
        </p>
      </td>
    </tr>
  </table>
</div>
</body>
</html>
