# Services
include:
  - docker-compose-databases.yml

x-common-env: &common-env
  env_file:
    - .env

services:
  # ============================================================================
  # authentication_service (Port 8080)
  # Primary auth service - depends on FusionAuth, Redis, MacroDB
  # ============================================================================
  authentication_service:
    <<: *common-env
    build:
      context: ./rust/cloud-storage
      dockerfile: Dockerfile.dev
      target: authentication_service
    ports:
      - "8080:8080"
    depends_on:
      - redis
    networks:
      - databases
      - services
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # ============================================================================
  # comms_service (Port 8081)
  # Communications/messaging service
  # ============================================================================
  comms_service:
    <<: *common-env
    build:
      context: ./rust/cloud-storage
      dockerfile: Dockerfile.dev
      target: comms_service
    ports:
      - "8081:8080"
    depends_on:
      - authentication_service
      - connection_gateway
    networks:
      - databases
      - services
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # ============================================================================
  # connection_gateway (Port 8082)
  # WebSocket gateway - Redis only
  # ============================================================================
  connection_gateway:
    <<: *common-env
    build:
      context: ./rust/cloud-storage
      dockerfile: Dockerfile.dev
      target: connection_gateway_service
    ports:
      - "8082:8080"
    depends_on:
      - redis
    networks:
      - databases
      - services
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # ============================================================================
  # contacts_service (Port 8083)
  # Contact management - ContactsDB
  # ============================================================================
  contacts_service:
    <<: *common-env
    build:
      context: ./rust/cloud-storage
      dockerfile: Dockerfile.dev
      target: contacts_service
    ports:
      - "8083:8080"
    environment:
      - DATABASE_URL=${CONTACTSDB_URL}
    networks:
      - databases
      - services
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # ============================================================================
  # convert_service (Port 8084)
  # Document format conversion - requires LibreOffice
  # ============================================================================
  convert_service:
    <<: *common-env
    build:
      context: ./rust/cloud-storage
      dockerfile: Dockerfile.convert_service.dev
      target: convert_service
    ports:
      - "8084:8080"
    networks:
      - databases
      - services
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # ============================================================================
  # document_cognition_service (Port 8085)
  # Document analysis and processing
  # ============================================================================
  document_cognition_service:
    <<: *common-env
    build:
      context: ./rust/cloud-storage
      dockerfile: Dockerfile.dev
      target: document_cognition_service
    ports:
      - "8085:8080"
    depends_on:
      - comms_service
      - document_storage_service
      - search_service
      - email_service
      - static_file_service
    networks:
      - databases
      - services
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # ============================================================================
  # document_storage_service (Port 8086)
  # Main document storage API
  # ============================================================================
  document_storage_service:
    <<: *common-env
    build:
      context: ./rust/cloud-storage
      dockerfile: Dockerfile.dev
      target: document_storage_service
    ports:
      - "8086:8080"
    depends_on:
      - redis
      - connection_gateway
      - authentication_service
    networks:
      - databases
      - services
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # ============================================================================
  # email_service (Port 8087)
  # Email processing and management
  # ============================================================================
  email_service:
    <<: *common-env
    build:
      context: ./rust/cloud-storage
      dockerfile: Dockerfile.dev
      target: email_service
    ports:
      - "8087:8080"
    depends_on:
      - authentication_service
      - document_storage_service
      - connection_gateway
      - static_file_service
      - redis
    networks:
      - databases
      - services
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # ============================================================================
  # experiment_service (Port 8088)
  # Feature flags and experiments
  # ============================================================================
  experiment_service:
    <<: *common-env
    build:
      context: ./rust/cloud-storage
      dockerfile: Dockerfile.dev
      target: experiment_service
    ports:
      - "8088:8080"
    networks:
      - databases
      - services
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # ============================================================================
  # notification_service (Port 8089)
  # User notifications - NotificationDB
  # ============================================================================
  notification_service:
    <<: *common-env
    build:
      context: ./rust/cloud-storage
      dockerfile: Dockerfile.dev
      target: notification_service
    ports:
      - "8089:8080"
    environment:
      # Explicitly override as this is a unique databas
      - DATABASE_URL=${NOTIFICATIONDB_URL}
    depends_on:
      - redis
      - document_cognition_service
      - authentication_service
      - connection_gateway
      - document_storage_service
    networks:
      - databases
      - services
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # ============================================================================
  # organization_service (Port 8090)
  # Organization and team management
  # ============================================================================
  organization_service:
    <<: *common-env
    build:
      context: ./rust/cloud-storage
      dockerfile: Dockerfile.dev
      target: organization_service
    ports:
      - "8090:8080"
    depends_on:
      - redis
      - document_storage_service
      - authentication_service
    networks:
      - databases
      - services
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # ============================================================================
  # properties_service (Port 8091)
  # User/document properties
  # ============================================================================
  properties_service:
    <<: *common-env
    build:
      context: ./rust/cloud-storage
      dockerfile: Dockerfile.dev
      target: properties_service
    ports:
      - "8091:8080"
    depends_on:
      - comms_service
    networks:
      - databases
      - services
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # ============================================================================
  # search_processing_service (Port 8092)
  # Search indexing worker
  # ============================================================================
  search_processing_service:
    <<: *common-env
    build:
      context: ./rust/cloud-storage
      dockerfile: Dockerfile.search_processing_service.dev
    ports:
      - "8092:8080"
    depends_on:
      - email_service
      - comms_service
    networks:
      - databases
      - services
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # ============================================================================
  # search_service (Port 8093)
  # Search API
  # ============================================================================
  search_service:
    <<: *common-env
    build:
      context: ./rust/cloud-storage
      dockerfile: Dockerfile.dev
      target: search_service
    ports:
      - "8093:8080"
    depends_on:
      - comms_service
      - email_service
      - document_storage_service
    networks:
      - databases
      - services
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # ============================================================================
  # static_file_service (Port 8094)
  # Static file serving - DynamoDB
  # ============================================================================
  static_file_service:
    <<: *common-env
    build:
      context: ./rust/cloud-storage
      dockerfile: Dockerfile.dev
      target: static_file_service
    ports:
      - "8094:8080"
    networks:
      - databases
      - services
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # ============================================================================
  # unfurl_service (Port 8095)
  # URL unfurling - no dependencies
  # ============================================================================
  unfurl_service:
    <<: *common-env
    build:
      context: ./rust/cloud-storage
      dockerfile: Dockerfile.dev
      target: unfurl_service
    ports:
      - "8095:8080"
    networks:
      - services
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

networks:
  services:
    driver: bridge
  databases:
    external: true
