# Services
include:
  - docker-compose-databases.yml
  - infra/stacks/fusionauth-instance/docker-compose.yml

x-common-env: &common-env
  env_file:
    - .env

services:
  # ============================================================================
  # authentication-service (Port 8080)
  # Primary auth service - depends on FusionAuth, Redis, MacroDB
  # ============================================================================
  authentication-service:
    <<: *common-env
    build:
      context: ./rust/cloud-storage
      dockerfile: Dockerfile.dev
      target: authentication_service
    ports:
      - "8080:8080"
    depends_on:
      - postgres
      - fusionauth
      - redis
    networks:
      - auth
      - databases
      - services
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # ============================================================================
  # connection_gateway (Port 8082)
  # WebSocket gateway - Redis only
  # ============================================================================
  connection_gateway:
    <<: *common-env
    build:
      context: ./rust/cloud-storage
      dockerfile: Dockerfile.dev
      target: connection_gateway_service
    ports:
      - "8082:8080"
    depends_on:
      - redis
    networks:
      - databases
      - services
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # ============================================================================
  # contacts_service (Port 8083)
  # Contact management - ContactsDB
  # ============================================================================
  contacts_service:
    <<: *common-env
    build:
      context: ./rust/cloud-storage
      dockerfile: Dockerfile.dev
      target: contacts_service
    ports:
      - "8083:8080"
    networks:
      - databases
      - services
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # ============================================================================
  # document_cognition_service (Port 8085)
  # Document analysis and processing
  # ============================================================================
  document_cognition_service:
    <<: *common-env
    build:
      context: ./rust/cloud-storage
      dockerfile: Dockerfile.dev
      target: document_cognition_service
    ports:
      - "8085:8080"
    depends_on:
      - document_storage_service
      - email_service
      - static_file_service
    networks:
      - databases
      - services
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # ============================================================================
  # document_storage_service (Port 8086)
  # Main document storage API
  # ============================================================================
  document_storage_service:
    <<: *common-env
    build:
      context: ./rust/cloud-storage
      dockerfile: Dockerfile.dev
      target: document_storage_service
    ports:
      - "8086:8080"
    depends_on:
      - redis
      - connection_gateway
      - authentication-service
    networks:
      - databases
      - services
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # ============================================================================
  # email_service (Port 8087)
  # Email processing and management
  # ============================================================================
  email_service:
    <<: *common-env
    build:
      context: ./rust/cloud-storage
      dockerfile: Dockerfile.dev
      target: email_service
    ports:
      - "8087:8080"
    depends_on:
      - authentication-service
      - document_storage_service
      - connection_gateway
      - static_file_service
      - redis
    networks:
      - databases
      - services
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # ============================================================================
  # notification_service (Port 8089)
  # User notifications - NotificationDB
  # ============================================================================
  notification_service:
    <<: *common-env
    build:
      context: ./rust/cloud-storage
      dockerfile: Dockerfile.dev
      target: notification_service
    ports:
      - "8089:8080"
    depends_on:
      - redis
      - document_cognition_service
      - authentication-service
      - connection_gateway
      - document_storage_service
    networks:
      - databases
      - services
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # ============================================================================
  # search_processing_service (Port 8092)
  # Search indexing worker
  # ============================================================================
  search_processing_service:
    profiles:
      - processors
    <<: *common-env
    build:
      context: ./rust/cloud-storage
      dockerfile: Dockerfile.search_processing_service.dev
    ports:
      - "8092:8080"
    depends_on:
      - email_service
    networks:
      - databases
      - services
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # ============================================================================
  # static_file_service (Port 8094)
  # Static file serving - DynamoDB
  # ============================================================================
  static_file_service:
    <<: *common-env
    build:
      context: ./rust/cloud-storage
      dockerfile: Dockerfile.dev
      target: static_file_service
    ports:
      - "8094:8080"
    networks:
      - databases
      - services
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # ============================================================================
  # static_file_cdn (Port 8100)
  # Local CloudFront emulation - routes to S3 and static_file_service
  # ============================================================================
  static_file_cdn:
    image: nginx:alpine
    ports:
      - "8100:80"
    volumes:
      - ./infra/local/nginx/static-file-cdn.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - static_file_service
    networks:
      - databases
      - services

  # ============================================================================
  # unfurl_service (Port 8095)
  # URL unfurling - no dependencies
  # ============================================================================
  unfurl_service:
    <<: *common-env
    build:
      context: ./rust/cloud-storage
      dockerfile: Dockerfile.dev
      target: unfurl_service
    ports:
      - "8095:8080"
    networks:
      - services
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # ============================================================================
  # image_proxy_service (Port 8097)
  # Proxies external images to avoid CORS issues and IP leakage
  # ============================================================================
  image_proxy_service:
    <<: *common-env
    build:
      context: ./rust/cloud-storage
      dockerfile: Dockerfile.dev
      target: image_proxy_service
    ports:
      - "8097:8080"
    networks:
      - services
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # ============================================================================
  # websocket_service (Port 6969)
  # Simple WebSocket service - responds with "ping" to all messages
  # ============================================================================
  websocket_service:
    build:
      context: ./js/websocket-service
      dockerfile: Dockerfile
    ports:
      - "6969:6969"
    networks:
      - services

  # ============================================================================
  # sync_service (Port 8787)
  # Document sync service using Cloudflare Workers/Durable Objects (via miniflare)
  # ============================================================================
  sync_service:
    <<: *common-env
    build:
      context: ./rust/sync-service
      dockerfile: Dockerfile
    ports:
      - "8787:8787"
    environment:
      - INTERNAL_API_SECRET_KEY=${INTERNAL_API_SECRET_KEY}
    networks:
      - services
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8787/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # ============================================================================
  # lexical_service (Port 8096)
  # Lexical document conversion service - converts Lexical JSON to various formats
  # ============================================================================
  lexical_service:
    <<: *common-env
    build:
      context: ./js/lexical-service
      dockerfile: Dockerfile
      args:
        GITHUB_PACKAGES_TOKEN: ${GITHUB_PACKAGES_TOKEN}
    ports:
      - "8096:8096"
    depends_on:
      - sync_service
    environment:
      - PORT=8096
      - INTERNAL_AUTH_KEY=${INTERNAL_API_SECRET_KEY}
      - SYNC_SERVICE_AUTH_KEY=${INTERNAL_API_SECRET_KEY}
      - SYNC_SERVICE_URL=http://sync_service:8787
    networks:
      - services
    healthcheck:
      test: ["CMD", "bun", "-e", "fetch('http://localhost:8096/health').then(r => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

networks:
  services:
    driver: bridge
  databases:
    external: true
  auth:
    external: true
