name: Setup Cachix
description: Install Cachix if needed and configure the macro-inc binary cache.

inputs:
  cachix-auth-token:
    description: Cachix auth token used to configure authenticated pulls and pushes.
    required: false
    default: ''
  cache-name:
    description: Cachix cache name.
    required: false
    default: macro-inc
  dev-shell:
    description: Enter the repository Nix dev shell after configuring Cachix.
    required: false
    default: 'false'
  sccache-bucket:
    description: Optional S3 bucket for shared sccache storage.
    required: false
    default: ''
  sccache-region:
    description: AWS region for the shared sccache S3 bucket.
    required: false
    default: us-east-1
  sccache-s3-key-prefix:
    description: S3 key prefix for shared sccache storage.
    required: false
    default: sccache/

runs:
  using: composite
  steps:
    - name: Configure Cachix
      shell: bash
      env:
        CACHIX_AUTH_TOKEN: ${{ inputs.cachix-auth-token }}
        CACHIX_CACHE_NAME: ${{ inputs.cache-name }}
      run: |
        set -euo pipefail
        export NIX_REMOTE=daemon
        export PATH="$HOME/.nix-profile/bin:/nix/var/nix/profiles/default/bin:$PATH"
        echo "$HOME/.nix-profile/bin" >> "$GITHUB_PATH"
        echo "/nix/var/nix/profiles/default/bin" >> "$GITHUB_PATH"
        echo "CACHIX_CACHE_NAME=$CACHIX_CACHE_NAME" >> "$GITHUB_ENV"

        if ! command -v cachix >/dev/null 2>&1; then
          nix profile add nixpkgs#cachix
        fi

        export PATH="$HOME/.nix-profile/bin:/nix/var/nix/profiles/default/bin:$PATH"
        if [ -n "$CACHIX_AUTH_TOKEN" ]; then
          cachix authtoken "$CACHIX_AUTH_TOKEN"
        fi
        cachix use "$CACHIX_CACHE_NAME"

    - name: Configure sccache
      shell: bash
      env:
        SCCACHE_BUCKET_INPUT: ${{ inputs.sccache-bucket }}
        SCCACHE_REGION_INPUT: ${{ inputs.sccache-region }}
        SCCACHE_S3_KEY_PREFIX_INPUT: ${{ inputs.sccache-s3-key-prefix }}
      run: |
        set -euo pipefail
        mkdir -p "$HOME/.cache/sccache"
        {
          echo "SCCACHE_DIR=$HOME/.cache/sccache"
          echo "SCCACHE_CACHE_SIZE=5G"
          echo "SCCACHE_BASEDIR=${GITHUB_WORKSPACE:-$PWD}"
          if [ -n "$SCCACHE_BUCKET_INPUT" ]; then
            echo "SCCACHE_BUCKET=$SCCACHE_BUCKET_INPUT"
            echo "SCCACHE_REGION=$SCCACHE_REGION_INPUT"
            echo "SCCACHE_S3_KEY_PREFIX=$SCCACHE_S3_KEY_PREFIX_INPUT"
          fi
        } >> "$GITHUB_ENV"

    - name: Enter Nix dev shell
      if: ${{ inputs.dev-shell == 'true' }}
      shell: bash
      run: |
        set -euo pipefail
        nix print-dev-env --accept-flake-config > /tmp/dev-env
        echo "BASH_ENV=/tmp/dev-env" >> "$GITHUB_ENV"
        source /tmp/dev-env
        printf '%s\n' "$PATH" | tr ':' '\n' >> "$GITHUB_PATH"
