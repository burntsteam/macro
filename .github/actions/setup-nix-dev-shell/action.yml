name: Setup Nix Dev Shell
description: Configure Cachix and enter the repository Nix dev shell.

inputs:
  cachix-auth-token:
    description: Cachix auth token used to configure authenticated pulls and pushes.
    required: false
    default: ''
  cache-name:
    description: Cachix cache name.
    required: false
    default: macro-inc

runs:
  using: composite
  steps:
    - name: Configure Cachix
      uses: ./.github/actions/setup-cachix
      with:
        cachix-auth-token: ${{ inputs.cachix-auth-token }}
        cache-name: ${{ inputs.cache-name }}

    - name: Enter Nix dev shell
      shell: bash
      env:
        CACHIX_AUTH_TOKEN: ${{ inputs.cachix-auth-token }}
        CACHIX_CACHE_NAME: ${{ inputs.cache-name }}
      run: |
        set -euo pipefail
        if [ -n "$CACHIX_AUTH_TOKEN" ]; then
          cachix watch-store "$CACHIX_CACHE_NAME" &
          cachix_pid=$!
          trap 'kill "$cachix_pid" || true' EXIT
        fi
        nix print-dev-env --accept-flake-config > /tmp/dev-env
        echo "BASH_ENV=/tmp/dev-env" >> "$GITHUB_ENV"
        source /tmp/dev-env
        printf '%s\n' "$PATH" | tr ':' '\n' >> "$GITHUB_PATH"
