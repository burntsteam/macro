name: Setup Prereqs Web
description: Checkout and Setup Prerequisite Dependencies for web app
inputs:
  playwright:
    description: Install Playwright and cache
    required: false
    default: ''
  npm-rc-token:
    description: NPM RC Token
    required: false
    default: ''

runs:
  using: composite
  steps:
    - name: Setup Bun
      uses: oven-sh/setup-bun@v2

    - name: Setup Rust
      uses: ./.github/actions/setup-rust

    - name: Install wasm-pack
      shell: bash
      run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh

    - name: Install just
      uses: extractions/setup-just@v2

    - name: Build auth_service_rpc WASM
      shell: bash
      working-directory: rust/cloud-storage/rpc-interface/auth_service
      run: just generate

    - name: Setup bunfig.toml
      working-directory: js/app
      shell: bash
      run: |
        touch bunfig.toml
        echo "[run]" >> bunfig.toml
        echo "bun = true" >> bunfig.toml
        echo "[install]" >> bunfig.toml
        echo "linker = \"hoisted\"" >> bunfig.toml
        echo "[install.scopes]" >> bunfig.toml
        echo "macro-inc = { token = \"${{ inputs.npm-rc-token }}\", url = \"https://npm.pkg.github.com\" }" >> bunfig.toml

    - name: Install Dependencies
      shell: bash
      working-directory: js/app
      run: |
        bun install --frozen-lockfile
        bun add -g npm

    - name: Get Playwright version (for caching)
      if: inputs.playwright == 'true'
      shell: bash
      working-directory: js/app
      run: echo "PW_VERSION=$(bunx playwright --version | cut -d' ' -f2)" >> $GITHUB_ENV
    - name: Restore Playwright browsers
      if: inputs.playwright == 'true'
      id: pw-browsers
      uses: runs-on/cache/restore@v4
      with:
        path: ~/.cache/ms-playwright
        key: pw-browsers-${{ runner.os }}-${{ env.PW_VERSION }}
    - name: Install Playwright Browsers
      if: inputs.playwright == 'force' || (inputs.playwright == 'true' && steps.pw-browsers.outputs.cache-hit != 'true')
      shell: bash
      working-directory: js/app
      run: bunx playwright install --with-deps chromium
    - name: Save Playwright browsers to cache
      if: inputs.playwright == 'force' || (inputs.playwright == 'true' && steps.pw-browsers.outputs.cache-hit != 'true')
      uses: runs-on/cache/save@v4
      with:
        path: ~/.cache/ms-playwright
        key: pw-browsers-${{ runner.os }}-${{ env.PW_VERSION }}
