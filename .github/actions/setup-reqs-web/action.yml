name: Setup Prereqs Web
description: Checkout and Setup Prerequisite Dependencies for web app
inputs:
  playwright:
    description: Install Playwright and cache
    required: false
    default: ''

runs:
  using: composite
  steps:
    - name: Add Nix to PATH
      shell: bash
      run: echo "/nix/var/nix/profiles/default/bin" >> "$GITHUB_PATH"

    - name: Enter Nix dev shell
      shell: bash
      run: |
        set -euo pipefail
        nix print-dev-env --accept-flake-config > /tmp/dev-env
        echo "BASH_ENV=/tmp/dev-env" >> "$GITHUB_ENV"
        source /tmp/dev-env
        printf '%s\n' "$PATH" | tr ':' '\n' >> "$GITHUB_PATH"

    - name: Setup bunfig.toml
      working-directory: js
      shell: bash
      run: |
        echo "[run]" >> bunfig.toml
        echo "bun = true" >> bunfig.toml

    - name: Install Dependencies
      shell: bash
      working-directory: js
      run: bun install --frozen-lockfile

    - name: Get Playwright version (for caching)
      if: inputs.playwright == 'true'
      shell: bash
      working-directory: js/app
      run: echo "PW_VERSION=$(bunx playwright --version | cut -d' ' -f2)" >> $GITHUB_ENV
    - name: Restore Playwright browsers
      if: inputs.playwright == 'true'
      id: pw-browsers
      uses: runs-on/cache/restore@v4
      with:
        path: ~/.cache/ms-playwright
        key: pw-browsers-${{ runner.os }}-${{ env.PW_VERSION }}
    - name: Install Playwright Browsers
      if: inputs.playwright == 'force' || (inputs.playwright == 'true' && steps.pw-browsers.outputs.cache-hit != 'true')
      shell: bash
      working-directory: js/app
      run: bunx playwright install --with-deps chromium
    - name: Save Playwright browsers to cache
      if: inputs.playwright == 'force' || (inputs.playwright == 'true' && steps.pw-browsers.outputs.cache-hit != 'true')
      uses: runs-on/cache/save@v4
      with:
        path: ~/.cache/ms-playwright
        key: pw-browsers-${{ runner.os }}-${{ env.PW_VERSION }}
