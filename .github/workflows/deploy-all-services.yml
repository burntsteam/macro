name: Deploy All Services
on:
  workflow_dispatch:
    inputs:
      environment:
        type: choice
        required: true
        default: 'dev'
        options:
          - dev
          - prod
        description: The environment we are deploying to.
  workflow_call:
    inputs:
      environment:
        type: string
        required: true
        description: The environment we are deploying to.
    secrets:
      AWS_ACCESS_KEY:
        required: true
      AWS_SECRET_ACCESS_KEY:
        required: true
      PULUMI_ACCESS_TOKEN:
        required: true
      DD_APP_KEY:
        required: true
      DD_API_KEY:
        required: true
      CACHIX_AUTH_TOKEN:
        required: true

# Only run 1 deploy-all workflow at a time per environment
concurrency:
  group: ${{ github.workflow }}-all-services-${{ inputs.environment }}
  cancel-in-progress: false

jobs:
  setup:
    name: Setup Deployment Matrix
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      - name: Set deployment matrix
        id: set-matrix
        run: |
          # Get all services
          services=$(jq -r '.services | keys | @json' .github/services-config.json)
          echo "matrix=${services}" >> $GITHUB_OUTPUT
          echo "Deploying services: ${services}"

  build-lambda-artifacts:
    name: Build ${{ matrix.service }} Lambda artifacts
    needs: setup
    if: ${{ needs.setup.outputs.matrix != '[]' }}
    runs-on: linux-extra-beefy
    strategy:
      fail-fast: false
      max-parallel: 8
      matrix:
        service: ${{ fromJson(needs.setup.outputs.matrix) }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          clean: false

      - name: Configure Cachix
        uses: ./.github/actions/setup-cachix
        with:
          cachix-auth-token: ${{ secrets.CACHIX_AUTH_TOKEN }}

      - name: Check Lambda config
        id: check-lambdas
        env:
          SERVICE: ${{ matrix.service }}
        run: |
          has_lambdas=$(jq -r --arg service "$SERVICE" '((.services[$service].deploy_lambdas // []) | length) > 0' .github/services-config.json)
          echo "has_lambdas=$has_lambdas" >> "$GITHUB_OUTPUT"

      - name: Build Lambda artifacts
        if: ${{ steps.check-lambdas.outputs.has_lambdas == 'true' }}
        env:
          SERVICE: ${{ matrix.service }}
        run: .github/scripts/build-cloud-storage-lambdas.sh

      - name: Upload Lambda artifacts
        if: ${{ steps.check-lambdas.outputs.has_lambdas == 'true' }}
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: cloud-storage-lambdas-${{ matrix.service }}-${{ github.sha }}
          path: lambda-artifacts.tar.gz
          retention-days: 7

  deploy-services:
    name: Deploy ${{ matrix.service }}
    needs: [setup, build-lambda-artifacts]
    if: ${{ needs.setup.outputs.matrix != '[]' }}
    runs-on:
      [
        runs-on,
        runner=8cpu-linux-x64,
        hdd=40,
        spot=false,
        ssh=false,
        'run-id=${{github.run_id}}-${{ matrix.service }}',
      ]
    strategy:
      fail-fast: false
      max-parallel: 20  # Limit concurrent deployments
      matrix:
        service: ${{ fromJson(needs.setup.outputs.matrix) }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Get project name
        id: project-name
        uses: ./.github/actions/get-project-name
        with:
          service-name: ${{ matrix.service }}

      - name: Check artifact config
        id: check-artifacts
        env:
          SERVICE: ${{ matrix.service }}
        run: |
          has_lambdas=$(jq -r --arg service "$SERVICE" '((.services[$service].deploy_lambdas // []) | length) > 0' .github/services-config.json)
          echo "has_lambdas=$has_lambdas" >> "$GITHUB_OUTPUT"

      - name: Deploy ${{ matrix.service }}
        uses: ./.github/actions/deploy-cloud-storage-pulumi
        with:
          environment: ${{ inputs.environment }}
          aws-access-key: ${{ secrets.AWS_ACCESS_KEY }}
          aws-secret-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          pulumi-access-token: ${{ secrets.PULUMI_ACCESS_TOKEN }}
          pulumi-service-name: ${{ steps.project-name.outputs.project-name }}
          lambda-artifacts: ${{ steps.check-artifacts.outputs.has_lambdas == 'true' && format('cloud-storage-lambdas-{0}-{1}', matrix.service, github.sha) || '' }}
          dd-app-key: ${{ secrets.DD_APP_KEY }}
          dd-api-key: ${{ secrets.DD_API_KEY }}

  deployment-summary:
    name: Deployment Summary
    runs-on: ubuntu-latest
    needs: [setup, build-lambda-artifacts, deploy-services]
    if: always()
    steps:
      - name: Check deployment results
        run: |
          if [[ "${{ needs.setup.result }}" == "failure" ]]; then
            echo "❌ Deployment setup failed"
            exit 1
          elif [[ "${{ needs.setup.result }}" == "skipped" ]]; then
            echo "⏭️ Deployment setup was skipped"
          elif [[ "${{ needs.build-lambda-artifacts.result }}" == "failure" ]]; then
            echo "❌ One or more Lambda artifact builds failed"
            exit 1
          elif [[ "${{ needs.deploy-services.result }}" == "failure" ]]; then
            echo "❌ One or more service deployments failed"
            exit 1
          elif [[ "${{ needs.deploy-services.result }}" == "skipped" ]]; then
            echo "⏭️ No services to deploy"
          else
            echo "✅ All service deployments completed successfully for ${{ inputs.environment }} environment"
          fi
