name: cloud storage code check
on:
  pull_request:
    branches: [ 'main' ]
    types: [opened, synchronize, reopened, ready_for_review]

env:
  CARGO_INCREMENTAL: '0'
  CARGO_TERM_COLOR: always
  CARGO_PROFILE_DEV_DEBUG: limited
  CARGO_PROFILE_TEST_DEBUG: limited
  RUST_BACKTRACE: '1'
  RUSTFLAGS: "-C link-arg=-fuse-ld=lld"

concurrency:
  group: code-check-cloud-storage-${{ github.ref }}
  cancel-in-progress: true

jobs:
  path-check:
    runs-on: ubuntu-latest
    outputs:
      should_run: ${{ steps.filter.outputs.should_run }}
      nextest_filter: ${{ steps.package-filter.outputs.nextest_filter }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          clean: false
          fetch-depth: 0
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            should_run:
              - 'rust/cloud-storage/**'
              - 'rust/rust-toolchain.toml'
              - 'flake.nix'
              - 'flake.lock'
              - '.github/actions/setup-cachix/**'
              - '.github/actions/setup-sccache/**'
              - '.github/services-config.json'
              - '.github/scripts/build-cloud-storage-lambdas.sh'
              - .github/workflows/code-check-cloud-storage.yml
      - name: compute nextest package filter
        id: package-filter
        if: steps.filter.outputs.should_run == 'true'
        shell: bash
        run: |
          set -euo pipefail

          if [ -z "${GITHUB_BASE_REF:-}" ]; then
            compare_rev="$(git rev-parse HEAD~1)"
          else
            git fetch origin "$GITHUB_BASE_REF:refs/remotes/origin/$GITHUB_BASE_REF"
            if ! compare_rev="$(git merge-base "origin/${GITHUB_BASE_REF}" HEAD)"; then
              echo "Unable to find merge-base for origin/${GITHUB_BASE_REF}; falling back to full test suite" >&2
              echo "nextest_filter=" >> "$GITHUB_OUTPUT"
              exit 0
            fi
          fi

          changed_files="$(git diff --name-only "$compare_rev" "$GITHUB_SHA")"
          printf '%s\n' "$changed_files" > /tmp/changed-files

          # Root cargo/toolchain/CI changes can affect the whole workspace, so run all tests.
          if printf '%s\n' "$changed_files" | grep -qE '^(rust/rust-toolchain\.toml|flake\.nix|flake\.lock|rust/cloud-storage/Cargo\.(toml|lock)|rust/cloud-storage/\.cargo/.*|\.github/actions/(setup-rust|setup-cachix|setup-sccache)/.*|\.github/workflows/code-check-cloud-storage\.yml)$'; then
            echo "Workspace-level change detected; running all tests"
            echo "nextest_filter=" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          filterset="$(
            python3 <<'PY'
          import glob
          import re
          from pathlib import Path

          repo = Path.cwd().resolve()
          workspace = repo / 'rust' / 'cloud-storage'
          changed_files = [line for line in Path('/tmp/changed-files').read_text().splitlines() if line]

          def workspace_members(manifest: Path) -> list[str]:
              members = []
              in_workspace = False
              in_members = False

              for raw_line in manifest.read_text().splitlines():
                  line = raw_line.split('#', 1)[0].strip()
                  if not line:
                      continue
                  if line.startswith('['):
                      in_workspace = line == '[workspace]'
                      continue
                  if not in_workspace:
                      continue
                  if line.startswith('members') and '[' in line:
                      in_members = True
                  if in_members:
                      members.extend(re.findall(r'"([^"\\]*(?:\\.[^"\\]*)*)"', line))
                      if ']' in line:
                          in_members = False
              return members

          def package_name(manifest: Path) -> str | None:
              in_package = False
              for raw_line in manifest.read_text().splitlines():
                  line = raw_line.split('#', 1)[0].strip()
                  if not line:
                      continue
                  if line.startswith('['):
                      in_package = line == '[package]'
                      continue
                  if in_package:
                      match = re.match(r'name\s*=\s*"([^"]+)"', line)
                      if match:
                          return match.group(1)
              return None

          packages = []
          for member in workspace_members(workspace / 'Cargo.toml'):
              for member_dir in glob.glob(str(workspace / member)):
                  manifest = Path(member_dir) / 'Cargo.toml'
                  if not manifest.exists():
                      continue
                  name = package_name(manifest)
                  if name:
                      packages.append((manifest.parent.resolve(), name))

          changed_packages = set()
          for changed_file in changed_files:
              path = (repo / changed_file).resolve()
              if path != workspace and workspace not in path.parents:
                  continue

              matching_packages = [
                  (manifest_dir, name)
                  for manifest_dir, name in packages
                  if path == manifest_dir or manifest_dir in path.parents
              ]
              if matching_packages:
                  _, name = max(matching_packages, key=lambda item: len(item[0].parts))
                  changed_packages.add(name)

          def escape_nextest_name(name: str) -> str:
              return (
                  name
                  .replace('\\', '\\\\')
                  .replace(')', '\\)')
                  .replace(',', '\\,')
              )

          if changed_packages:
              print('|'.join(f'rdeps(={escape_nextest_name(name)})' for name in sorted(changed_packages)))
          PY
          )"

          if [ -z "$filterset" ]; then
            echo "No package-specific Rust changes detected; running all tests"
          else
            echo "nextest filter: $filterset"
          fi
          echo "nextest_filter=$filterset" >> "$GITHUB_OUTPUT"

  check:
    needs: path-check
    if: needs.path-check.outputs.should_run == 'true' && github.event.pull_request.draft == false
    runs-on: linux-extra-beefy
    env:
      RUSTFLAGS: "-Dwarnings -C link-arg=-fuse-ld=mold"
      RUSTDOCFLAGS: "-Dwarnings"
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          clean: false
      - name: Setup Nix dev shell
        uses: ./.github/actions/setup-cachix
        with:
          cachix-auth-token: ${{ secrets.CACHIX_AUTH_TOKEN }}
          dev-shell: 'true'
      - uses: Swatinem/rust-cache@9d47c6ad4b02e050fd481d890b2ea34778fd09d6
        with:
          workspaces: rust/cloud-storage
          shared-key: cloud-storage-check
          cache-on-failure: true
          cache-targets: false
      - name: Configure sccache S3 backend
        env:
          SCCACHE_BUCKET: ${{ vars.SCCACHE_BUCKET || secrets.SCCACHE_BUCKET }}
        run: |
          set -euo pipefail
          mkdir -p "$HOME/.cache/sccache"
          {
            echo "SCCACHE_DIR=$HOME/.cache/sccache"
            echo "SCCACHE_CACHE_SIZE=5G"
            echo "SCCACHE_BASEDIR=${GITHUB_WORKSPACE:-$PWD}"
            if [ -n "${SCCACHE_BUCKET:-}" ]; then
              echo "SCCACHE_BUCKET=${SCCACHE_BUCKET}"
              echo "SCCACHE_REGION=${SCCACHE_REGION:-us-east-1}"
              echo "SCCACHE_S3_KEY_PREFIX=${SCCACHE_S3_KEY_PREFIX:-sccache/}"
            fi
          } >> "$GITHUB_ENV"
          sccache --version
      - name: fmt
        run: cd rust/cloud-storage && cargo fmt --check
      - name: clippy
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID || secrets.AWS_ACCESS_KEY }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        run: cd rust/cloud-storage && cargo clippy --all-features
      - name: show sccache stats
        if: always()
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID || secrets.AWS_ACCESS_KEY }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        run: sccache --show-stats || true

  test:
    needs: path-check
    if: needs.path-check.outputs.should_run == 'true' && github.event.pull_request.draft == false
    runs-on: linux-extra-beefy
    env:
      NEXTEST_FILTER: ${{ needs.path-check.outputs.nextest_filter }}
      NEXTEST_TEST_THREADS: '32'
      RUSTFLAGS: "-Dwarnings -C link-arg=-fuse-ld=mold"
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: user
          POSTGRES_PASSWORD: password
          POSTGRES_DB: macrodb # Start with macrodb, we initialize all others in the cloud-storage/justfile
        ports:
          - 5432:5432
        # needed because the postgres container does not provide a healthcheck
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
          --shm-size 1g
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: --health-cmd "redis-cli ping" --health-interval 10s --health-timeout 5s --health-retries 5
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          clean: false
      - name: Setup Nix dev shell
        uses: ./.github/actions/setup-cachix
        with:
          cachix-auth-token: ${{ secrets.CACHIX_AUTH_TOKEN }}
          dev-shell: 'true'
      - uses: Swatinem/rust-cache@9d47c6ad4b02e050fd481d890b2ea34778fd09d6
        with:
          workspaces: rust/cloud-storage
          shared-key: cloud-storage-test
          cache-on-failure: true
          cache-targets: false
      - name: Configure sccache S3 backend
        env:
          SCCACHE_BUCKET: ${{ vars.SCCACHE_BUCKET || secrets.SCCACHE_BUCKET }}
        run: |
          set -euo pipefail
          mkdir -p "$HOME/.cache/sccache"
          {
            echo "SCCACHE_DIR=$HOME/.cache/sccache"
            echo "SCCACHE_CACHE_SIZE=5G"
            echo "SCCACHE_BASEDIR=${GITHUB_WORKSPACE:-$PWD}"
            if [ -n "${SCCACHE_BUCKET:-}" ]; then
              echo "SCCACHE_BUCKET=${SCCACHE_BUCKET}"
              echo "SCCACHE_REGION=${SCCACHE_REGION:-us-east-1}"
              echo "SCCACHE_S3_KEY_PREFIX=${SCCACHE_S3_KEY_PREFIX:-sccache/}"
            fi
          } >> "$GITHUB_ENV"
          sccache --version
      - name: configure postgres for concurrent tests
        run: |
          postgres_container="$(docker ps --format '{{.ID}} {{.Image}}' | awk '$2 == "pgvector/pgvector:pg16" { print $1; exit }')"
          if [ -z "$postgres_container" ]; then
            echo "pgvector/pgvector:pg16 service container not found" >&2
            docker ps
            exit 1
          fi

          docker exec -i "$postgres_container" psql -U user -d macrodb <<'SQL'
          ALTER SYSTEM SET fsync = off;
          ALTER SYSTEM SET synchronous_commit = off;
          ALTER SYSTEM SET full_page_writes = off;
          ALTER SYSTEM SET max_wal_size = '4GB';
          ALTER SYSTEM SET checkpoint_timeout = '30min';
          ALTER SYSTEM SET max_locks_per_transaction = 8192;
          SQL
          docker restart "$postgres_container"
          until docker exec "$postgres_container" pg_isready -U user -d macrodb; do
            sleep 1
          done
          docker exec "$postgres_container" psql -U user -d macrodb -c "SHOW max_locks_per_transaction;"
      - name: prepare tests
        run: just rust/cloud-storage/setup_test_envs && just rust/cloud-storage/initialize_dbs
      - name: run tests
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID || secrets.AWS_ACCESS_KEY }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        run: |
          cd rust/cloud-storage

          args=(--all-features --lib --bins --tests --test-threads "$NEXTEST_TEST_THREADS")
          if [ -n "$NEXTEST_FILTER" ]; then
            args+=(-E "$NEXTEST_FILTER")
          fi
          cargo nextest run "${args[@]}"
      - name: show sccache stats
        if: always()
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID || secrets.AWS_ACCESS_KEY }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        run: sccache --show-stats || true


  # Collector job that always runs - use this as the required status check
  status-check:
    name: Cloud Storage Status Check
    if: always()
    needs: [path-check, check, test]
    runs-on: ubuntu-latest
    steps:
      - name: Check job results
        run: |
          echo "path-check: ${{ needs.path-check.result }}"
          echo "check: ${{ needs.check.result }}"
          echo "test: ${{ needs.test.result }}"

          # Fail if any job failed (skipped and success are both OK)
          if [[ "${{ needs.path-check.result }}" == "failure" ]] || \
             [[ "${{ needs.check.result }}" == "failure" ]] || \
             [[ "${{ needs.test.result }}" == "failure" ]]; then
            echo "❌ One or more jobs failed"
            exit 1
          fi

          echo "✅ All jobs passed or were skipped"
