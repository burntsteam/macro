name: 'Web App Pr Checks'
on:
  pull_request:
    branches:
      - main
    types: [opened, synchronize, reopened, ready_for_review]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}-check
  cancel-in-progress: true

jobs:
  path-check:
    runs-on: ubuntu-latest
    outputs:
      should_run: ${{ steps.filter.outputs.should_run }}
      api_changed: ${{ steps.filter.outputs.api_changed }}
    steps:
      - uses: actions/checkout@v6
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            should_run:
              - 'js/package.json'
              - 'js/bun.lock'
              - 'js/app/package.json'
              - 'js/app/packages/**'
              - 'js/app/src/**'
              - 'js/app/biome.jsonc'
              - 'js/lexical-core/**'
              - 'js/lexical-service/**'
              - '.github/actions/setup-cachix/**'
              - '.github/actions/setup-nix-dev-shell/**'
              - '.github/actions/setup-reqs-web/**'
              - '.github/workflows/web-app-check-main.yml'
            api_changed:
              - 'rust/cloud-storage/**/*.rs'
              - 'rust/cloud-storage/Cargo.toml'
              - 'rust/cloud-storage/Cargo.lock'
              - 'flake.nix'
              - 'flake.lock'
              - 'js/app/scripts/generate-api-schema.ts'
              - 'js/app/scripts/services.ts'
              - '.github/actions/setup-cachix/**'
              - '.github/actions/setup-nix-dev-shell/**'
              - '.github/actions/setup-reqs-web/**'
              - '.github/workflows/web-app-check-main.yml'

  typescript:
    needs: path-check
    # Run the type check if rust code or frontend code has changed.
    if: needs.path-check.outputs.should_run == 'true' || needs.path-check.outputs.api_changed == 'true'
    name: Typecheck
    runs-on: temp-middy
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v6
      - name: Setup Prereqs
        uses: ./.github/actions/setup-reqs-web
        with:
          cachix-auth-token: ${{ secrets.CACHIX_AUTH_TOKEN }}
      - uses: Swatinem/rust-cache@9d47c6ad4b02e050fd481d890b2ea34778fd09d6
        if: needs.path-check.outputs.api_changed == 'true'
        with:
          workspaces: rust/cloud-storage
          shared-key: cloud-storage-gen-api
          cache-on-failure: true
          cache-targets: true
      - name: Configure sccache S3 backend
        if: needs.path-check.outputs.api_changed == 'true'
        env:
          SCCACHE_BUCKET: ${{ vars.SCCACHE_BUCKET || secrets.SCCACHE_BUCKET }}
        run: |
          set -euo pipefail
          mkdir -p "$HOME/.cache/sccache"
          {
            echo "SCCACHE_DIR=$HOME/.cache/sccache"
            echo "SCCACHE_CACHE_SIZE=5G"
            echo "SCCACHE_BASEDIR=${GITHUB_WORKSPACE:-$PWD}"
            if [ -n "${SCCACHE_BUCKET:-}" ]; then
              echo "SCCACHE_BUCKET=${SCCACHE_BUCKET}"
              echo "SCCACHE_REGION=${SCCACHE_REGION:-us-east-1}"
              echo "SCCACHE_S3_KEY_PREFIX=${SCCACHE_S3_KEY_PREFIX:-sccache/}"
            fi
          } >> "$GITHUB_ENV"
          sccache --version
      - name: Generate API Types
        if: needs.path-check.outputs.api_changed == 'true'
        working-directory: js/app
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID || secrets.AWS_ACCESS_KEY }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        run: bun run gen-api -- --check
      - name: show sccache stats
        if: always() && needs.path-check.outputs.api_changed == 'true'
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID || secrets.AWS_ACCESS_KEY }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        run: sccache --show-stats || true
      - name: Check Types
        working-directory: js/app
        run: |
          bun run --bun --silent tsc --project ./packages/app/tsconfig.json

  biome-check:
    needs: path-check
    if: needs.path-check.outputs.should_run == 'true'
    name: Biome Check
    runs-on: temp-middy
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Setup Nix dev shell
        uses: ./.github/actions/setup-nix-dev-shell
        with:
          cachix-auth-token: ${{ secrets.CACHIX_AUTH_TOKEN }}
      - name: Run Biome
        working-directory: js/app
        run: biome ci --changed --no-errors-on-unmatched --error-on-warnings

  tailwind:
    needs: path-check
    if: needs.path-check.outputs.should_run == 'true'
    name: Theme Hygiene Inspector
    runs-on: temp-middy
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Setup Prereqs
        uses: ./.github/actions/setup-reqs-web
        with:
          cachix-auth-token: ${{ secrets.CACHIX_AUTH_TOKEN }}
      - name: Check Tailwind Classes
        working-directory: js/app
        run: just check-tailwind

  test:
    needs: path-check
    if: needs.path-check.outputs.should_run == 'true'
    name: Test
    runs-on: temp-middy
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v6
      - name: Setup
        uses: ./.github/actions/setup-reqs-web
        with:
          cachix-auth-token: ${{ secrets.CACHIX_AUTH_TOKEN }}
          playwright: 'true'
      - name: Test
        working-directory: js/app
        run: bunx vitest

  cycles:
    needs: path-check
    if: needs.path-check.outputs.should_run == 'true'
    name: Cycles Import Check
    runs-on: temp-middy
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Setup Nix dev shell
        uses: ./.github/actions/setup-nix-dev-shell
        with:
          cachix-auth-token: ${{ secrets.CACHIX_AUTH_TOKEN }}
      - name: Cycles Import Check
        working-directory: js/app
        run: biome lint --changed --no-errors-on-unmatched --only=suspicious/noImportCycles

  build:
    needs: path-check
    if: needs.path-check.outputs.should_run == 'true'
    name: Build
    runs-on: temp-middy
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v6
      - name: Setup
        uses: ./.github/actions/setup-reqs-web
        with:
          cachix-auth-token: ${{ secrets.CACHIX_AUTH_TOKEN }}
      - name: Build
        working-directory: js/app
        run: bun run build

  # Collector job that always runs - use this as the required status check
  status-check:
    name: Web App Status Check
    if: always()
    needs: [path-check, typescript, biome-check, tailwind, test, cycles, build]
    runs-on: ubuntu-latest
    steps:
      - name: Check job results
        run: |
          echo "path-check: ${{ needs.path-check.result }}"
          echo "typescript: ${{ needs.typescript.result }}"
          echo "biome-check: ${{ needs.biome-check.result }}"
          echo "tailwind: ${{ needs.tailwind.result }}"
          echo "test: ${{ needs.test.result }}"
          echo "cycles: ${{ needs.cycles.result }}"
          echo "build: ${{ needs.build.result }}"

          # Fail if any job failed (skipped and success are both OK)
          if [[ "${{ needs.path-check.result }}" == "failure" ]] || \
             [[ "${{ needs.typescript.result }}" == "failure" ]] || \
             [[ "${{ needs.biome-check.result }}" == "failure" ]] || \
             [[ "${{ needs.tailwind.result }}" == "failure" ]] || \
             [[ "${{ needs.test.result }}" == "failure" ]] || \
             [[ "${{ needs.cycles.result }}" == "failure" ]] || \
             [[ "${{ needs.build.result }}" == "failure" ]]; then
            echo "❌ One or more jobs failed"
            exit 1
          fi

          echo "✅ All jobs passed or were skipped"
