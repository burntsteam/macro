name: Deploy Cloud Storage Services on Push

on:
  workflow_dispatch:
    inputs:
      service:
        type: choice
        required: true
        default: static-file-service
        description: Service to deploy to dev for end-to-end testing
        options:
          - agent-schedule-service
          - authentication-service
          - connection-gateway
          - contacts-service
          - convert-service
          - document-cognition-service
          - document-storage-service
          - email-service
          - image-proxy-service
          - mcp-server
          - notification-service
          - search-processing-service
          - static-file-service
          - unfurl-service
  push:
    branches: [ 'main' ]
    paths:
      - 'rust/cloud-storage/**'
      - 'infra/**'
      - '.github/workflows/deploy-cloud-storage-on-push.yml'
      - '.github/actions/deploy-cloud-storage-pulumi/**'
      - '.github/scripts/build-cloud-storage-lambdas.sh'
      - '.github/services-config.json'
      - 'flake.nix'
      - 'flake.lock'

concurrency:
  group: deploy-cloud-storage-${{ github.ref }}
  cancel-in-progress: false

jobs:
  detect-changes:
    name: Detect Changed Services
    runs-on: ubuntu-latest
    outputs:
      services: ${{ steps.detect.outputs.services }}
      has_changes: ${{ steps.detect.outputs.has_changes }}
      lambda_matrix: ${{ steps.detect.outputs.lambda_matrix }}
      lambda_services: ${{ steps.detect.outputs.lambda_services }}
      has_lambdas: ${{ steps.detect.outputs.has_lambdas }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          fetch-depth: 2

      - name: Setup Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable

      - name: Detect changed services
        id: detect
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            SERVICES=$(jq -cn --arg service "${{ inputs.service }}" '[$service]')
            HAS_CHANGES=true
            echo "Manually selected service: $SERVICES"
          else
            # Make the script executable
            chmod +x .github/scripts/detect-affected-services.sh

            # Run the detection script and capture output
            OUTPUT=$(.github/scripts/detect-affected-services.sh)

            # Parse the output
            SERVICES=$(echo "$OUTPUT" | grep "^services=" | cut -d'=' -f2-)
            HAS_CHANGES=$(echo "$OUTPUT" | grep "^has_changes=" | cut -d'=' -f2-)
          fi

          lambda_matrix=$(jq -cn --argjson services "$SERVICES" --slurpfile config .github/services-config.json '$services as $services | $config[0] as $config | [$services[] as $service | ($config.services[$service].deploy_lambdas // [])[] | {service:$service, lambda:.}]')
          lambda_services=$(jq -cn --argjson matrix "$lambda_matrix" '[$matrix[].service] | unique')
          has_lambdas=$(jq -rn --argjson matrix "$lambda_matrix" '$matrix | length > 0')

          # Set outputs
          echo "services=$SERVICES" >> $GITHUB_OUTPUT
          echo "has_changes=$HAS_CHANGES" >> $GITHUB_OUTPUT
          echo "lambda_matrix=$lambda_matrix" >> $GITHUB_OUTPUT
          echo "lambda_services=$lambda_services" >> $GITHUB_OUTPUT
          echo "has_lambdas=$has_lambdas" >> $GITHUB_OUTPUT

          # Log for debugging
          echo "Detected services: $SERVICES"
          echo "Has changes: $HAS_CHANGES"
          echo "Lambda matrix: $lambda_matrix"

  migrate-db:
    name: Run Database Migrations
    needs: detect-changes
    if: ${{ needs.detect-changes.outputs.has_changes == 'true' }}
    runs-on: db-migrator
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          sparse-checkout: .github/

      - name: Run migrations
        uses: ./.github/actions/migrate-cloud-storage-db
        with:
          environment: dev

  build-service-binaries:
    name: Build ${{ matrix.service }} binaries
    needs: detect-changes
    if: ${{ needs.detect-changes.outputs.has_changes == 'true' }}
    runs-on: linux-extra-beefy
    strategy:
      fail-fast: false
      max-parallel: 8
      matrix:
        service: ${{ fromJson(needs.detect-changes.outputs.services) }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          clean: false

      - name: Configure Cachix
        uses: ./.github/actions/setup-cachix
        with:
          cachix-auth-token: ${{ secrets.CACHIX_AUTH_TOKEN }}

      - name: Build prebuilt binaries
        shell: bash
        env:
          SERVICE: ${{ matrix.service }}
        run: |
          set -euo pipefail
          mkdir -p prebuilt

          binaries=$(jq -r --arg service "$SERVICE" '.services[$service].deploy_binaries // [] | @tsv' .github/services-config.json)
          if [[ -n "$binaries" ]]; then
            cachix watch-store "$CACHIX_CACHE_NAME" &
            cachix_pid=$!
            trap 'kill "$cachix_pid" || true' EXIT

            nix build ".#deploy-service-binaries-${SERVICE}"
            cp -r result/bin/* prebuilt/
            mkdir -p prebuilt/nix-store
            while IFS= read -r store_path; do
              cp -a "$store_path" prebuilt/nix-store/
            done < <(nix-store -qR result)
          else
            echo "No deploy binaries configured for $SERVICE; uploading an empty artifact"
          fi

          touch prebuilt/.keep
          tar -C prebuilt -czf prebuilt-binaries.tar.gz .

      - name: Upload prebuilt binaries
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: cloud-storage-service-binaries-${{ matrix.service }}-${{ github.sha }}
          path: prebuilt-binaries.tar.gz
          retention-days: 7

  build-lambda-artifacts:
    name: Build ${{ matrix.lambda }} Lambda artifact
    needs: detect-changes
    if: ${{ needs.detect-changes.outputs.has_changes == 'true' && needs.detect-changes.outputs.has_lambdas == 'true' }}
    runs-on: linux-extra-beefy
    strategy:
      fail-fast: false
      max-parallel: 8
      matrix:
        include: ${{ fromJson(needs.detect-changes.outputs.lambda_matrix || '[]') }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          clean: false

      - name: Configure Cachix
        uses: ./.github/actions/setup-cachix
        with:
          cachix-auth-token: ${{ secrets.CACHIX_AUTH_TOKEN }}

      - name: Build Lambda artifact
        shell: bash
        env:
          LAMBDA: ${{ matrix.lambda }}
        run: |
          set -euo pipefail
          nix develop .# -c bash -lc '
            set -euo pipefail
            cd rust/cloud-storage
            echo "::group::Build $LAMBDA"
            ulimit -n 10240
            just "$LAMBDA/build"
            test -f "target/lambda/$LAMBDA/bootstrap.zip"
            echo "::endgroup::"
          '
          mkdir -p "lambda-artifacts/target/lambda/$LAMBDA"
          cp "rust/cloud-storage/target/lambda/$LAMBDA/bootstrap.zip" "lambda-artifacts/target/lambda/$LAMBDA/bootstrap.zip"

      - name: Upload Lambda artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: cloud-storage-lambda-${{ matrix.service }}-${{ matrix.lambda }}-${{ github.sha }}
          path: lambda-artifacts
          retention-days: 7

  package-lambda-artifacts:
    name: Package ${{ matrix.service }} Lambda artifacts
    needs: [detect-changes, build-lambda-artifacts]
    if: ${{ needs.detect-changes.outputs.has_changes == 'true' && needs.detect-changes.outputs.has_lambdas == 'true' }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      max-parallel: 8
      matrix:
        service: ${{ fromJson(needs.detect-changes.outputs.lambda_services || '[]') }}
    steps:
      - name: Download Lambda artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093
        with:
          pattern: cloud-storage-lambda-${{ matrix.service }}-*-${{ github.sha }}
          path: lambda-artifacts
          merge-multiple: true

      - name: Package Lambda artifacts
        run: tar -C lambda-artifacts -czf lambda-artifacts.tar.gz target

      - name: Upload Lambda artifacts
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: cloud-storage-lambdas-${{ matrix.service }}-${{ github.sha }}
          path: lambda-artifacts.tar.gz
          retention-days: 7

  deploy-services:
    name: Deploy ${{ matrix.service }}
    needs: [detect-changes, migrate-db, build-service-binaries, build-lambda-artifacts, package-lambda-artifacts]
    if: ${{ always() && needs.detect-changes.outputs.has_changes == 'true' && needs.migrate-db.result == 'success' && needs.build-service-binaries.result == 'success' && (needs.build-lambda-artifacts.result == 'success' || needs.build-lambda-artifacts.result == 'skipped') && (needs.package-lambda-artifacts.result == 'success' || needs.package-lambda-artifacts.result == 'skipped') }}
    runs-on:
      [
        runs-on,
        runner=8cpu-linux-x64,
        hdd=40,
        spot=false,
        ssh=false,
        'run-id=${{github.run_id}}-${{ matrix.service }}',
      ]
    strategy:
      fail-fast: false
      max-parallel: 20
      matrix:
        service: ${{ fromJson(needs.detect-changes.outputs.services) }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Get project name
        id: project-name
        uses: ./.github/actions/get-project-name
        with:
          service-name: ${{ matrix.service }}

      - name: Check artifact config
        id: check-artifacts
        env:
          SERVICE: ${{ matrix.service }}
        run: |
          has_binaries=$(jq -r --arg service "$SERVICE" '((.services[$service].deploy_binaries // []) | length) > 0' .github/services-config.json)
          has_lambdas=$(jq -r --arg service "$SERVICE" '((.services[$service].deploy_lambdas // []) | length) > 0' .github/services-config.json)
          echo "has_binaries=$has_binaries" >> "$GITHUB_OUTPUT"
          echo "has_lambdas=$has_lambdas" >> "$GITHUB_OUTPUT"

      - name: Deploy ${{ matrix.service }}
        uses: ./.github/actions/deploy-cloud-storage-pulumi
        with:
          environment: dev
          aws-access-key: ${{ secrets.AWS_ACCESS_KEY }}
          aws-secret-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          pulumi-access-token: ${{ secrets.PULUMI_ACCESS_TOKEN }}
          pulumi-service-name: ${{ steps.project-name.outputs.project-name }}
          prebuilt-binaries-artifact: ${{ steps.check-artifacts.outputs.has_binaries == 'true' && format('cloud-storage-service-binaries-{0}-{1}', matrix.service, github.sha) || '' }}
          lambda-artifacts: ${{ steps.check-artifacts.outputs.has_lambdas == 'true' && format('cloud-storage-lambdas-{0}-{1}', matrix.service, github.sha) || '' }}
          dd-app-key: ${{ secrets.DD_APP_KEY }}
          dd-api-key: ${{ secrets.DD_API_KEY }}

  deployment-summary:
    name: Deployment Summary
    runs-on: ubuntu-latest
    needs: [detect-changes, migrate-db, build-service-binaries, build-lambda-artifacts, package-lambda-artifacts, deploy-services]
    if: always()
    steps:
      - name: Check deployment results
        run: |
          if [[ "${{ needs.detect-changes.result }}" == "failure" ]]; then
            echo "❌ Failed to detect changed services"
            exit 1
          elif [[ "${{ needs.detect-changes.outputs.has_changes }}" == "false" ]]; then
            echo "ℹ️ No cloud-storage services were affected by the changes"
          elif [[ "${{ needs.migrate-db.result }}" == "failure" ]]; then
            echo "❌ Database migrations failed"
            exit 1
          elif [[ "${{ needs.build-service-binaries.result }}" == "failure" ]]; then
            echo "❌ One or more service binary builds failed"
            exit 1
          elif [[ "${{ needs.build-lambda-artifacts.result }}" == "failure" ]]; then
            echo "❌ One or more Lambda artifact builds failed"
            exit 1
          elif [[ "${{ needs.package-lambda-artifacts.result }}" == "failure" ]]; then
            echo "❌ One or more Lambda artifact packages failed"
            exit 1
          elif [[ "${{ needs.deploy-services.result }}" == "failure" ]]; then
            echo "❌ One or more service deployments failed"
            exit 1
          elif [[ "${{ needs.deploy-services.result }}" == "skipped" ]]; then
            echo "⏭️ No services to deploy"
          else
            echo "✅ All affected cloud-storage services deployed successfully to dev environment"
          fi
