# Thin trigger: every push to main touching the Rust services (or the deploy
# machinery) deploys all services to dev via the shared deploy-all-services
# pipeline — the same warm sticky-disk nix builds, crane/zigbuild lambdas, and
# handoff topology used by manual dispatches and prod releases. This replaced
# a standalone pipeline that built binaries on Cachix-only runners and lambdas
# via per-handler cargo-lambda jobs.
name: Deploy Cloud Storage Services on Push
on:
  push:
    branches: [ 'main' ]
    paths:
      - 'rust/cloud-storage/**'
      - 'infra/**'
      - '.github/workflows/deploy-cloud-storage-on-push.yml'
      - '.github/workflows/deploy-all-services.yml'
      - '.github/actions/deploy-cloud-storage-pulumi/**'
      - '.github/actions/setup-nix/**'
      - '.github/actions/teardown-nix/**'
      - '.github/actions/setup-cachix/**'
      - '.github/actions/migrate-cloud-storage-db/**'
      - '.github/scripts/build-cloud-storage-lambdas-nix.sh'
      - '.github/services-config.json'
      - '.github/workspace-dep-closures.json'
      - 'flake.nix'
      - 'flake.lock'

# NOTE: deliberately no concurrency block here. The called workflow's own
# top-level group (deploy-all-services-${{ inputs.environment }}) IS honored
# for workflow_call runs and is what serializes push deploys against manual
# dev dispatches (running deploys finish; queued pushes coalesce to the
# newest). Declaring the same group in this wrapper makes GitHub detect a
# self-deadlock ("between a top level workflow and ...") and cancel the run.

jobs:
  deploy-all:
    name: Deploy Cloud Storage Services
    uses: ./.github/workflows/deploy-all-services.yml
    with:
      environment: dev
    secrets:
      AWS_ACCESS_KEY: ${{ secrets.AWS_ACCESS_KEY }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      PULUMI_ACCESS_TOKEN: ${{ secrets.PULUMI_ACCESS_TOKEN }}
      DD_APP_KEY: ${{ secrets.DD_APP_KEY }}
      DD_API_KEY: ${{ secrets.DD_API_KEY }}
      CACHIX_AUTH_TOKEN: ${{ secrets.CACHIX_AUTH_TOKEN }}
