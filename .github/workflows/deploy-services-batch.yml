name: Deploy Services (Batch)
on:
  workflow_dispatch:
    inputs:
      environment:
        type: choice
        required: true
        default: 'dev'
        options:
          - dev
          - prod
        description: The environment to deploy to
      services:
        type: string
        required: true
        description: 'Comma-separated list of services to deploy (e.g., "document-cognition-service,static-file-service")'

concurrency:
  group: deploy-batch-${{ inputs.environment }}-${{ github.run_id }}
  cancel-in-progress: false

jobs:
  parse-services:
    name: Parse Services List
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.parse.outputs.matrix }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      - name: Parse and validate services
        id: parse
        run: |
          # Split comma-separated list into array
          IFS=',' read -ra SERVICES <<< "${{ inputs.services }}"
          
          # Trim whitespace and validate each service
          valid_services=()
          invalid_services=()
          
          # Get valid service names from config
          all_services=$(jq -r '.services | keys[]' .github/services-config.json)
          
          for service in "${SERVICES[@]}"; do
            # Trim whitespace
            service=$(echo "$service" | xargs)
          
            # Check if service exists in config
            if echo "$all_services" | grep -q "^${service}$"; then
              valid_services+=("$service")
            else
              invalid_services+=("$service")
            fi
          done
          
          # Report invalid services
          if [ ${#invalid_services[@]} -gt 0 ]; then
            echo "⚠️ Warning: The following services are invalid and will be skipped:"
            printf '%s\n' "${invalid_services[@]}"
          fi
          
          # Create matrix JSON
          if [ ${#valid_services[@]} -eq 0 ]; then
            echo "❌ No valid services found in the input list"
            exit 1
          else
            echo "✅ Valid services to deploy:"
            printf '%s\n' "${valid_services[@]}"
            matrix=$(printf '%s\n' "${valid_services[@]}" | jq -R . | jq -s .)
            echo "matrix=${matrix}" >> $GITHUB_OUTPUT
          fi

  build-lambda-artifacts:
    name: Build ${{ matrix.service }} Lambda artifacts
    needs: parse-services
    runs-on: linux-extra-beefy
    strategy:
      fail-fast: false
      max-parallel: 8
      matrix:
        service: ${{ fromJson(needs.parse-services.outputs.matrix) }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          clean: false

      - name: Configure Cachix
        uses: ./.github/actions/setup-cachix
        with:
          cachix-auth-token: ${{ secrets.CACHIX_AUTH_TOKEN }}

      - name: Check Lambda config
        id: check-lambdas
        env:
          SERVICE: ${{ matrix.service }}
        run: |
          has_lambdas=$(jq -r --arg service "$SERVICE" '((.services[$service].deploy_lambdas // []) | length) > 0' .github/services-config.json)
          echo "has_lambdas=$has_lambdas" >> "$GITHUB_OUTPUT"

      - name: Build Lambda artifacts
        if: ${{ steps.check-lambdas.outputs.has_lambdas == 'true' }}
        env:
          SERVICE: ${{ matrix.service }}
        run: .github/scripts/build-cloud-storage-lambdas.sh

      - name: Upload Lambda artifacts
        if: ${{ steps.check-lambdas.outputs.has_lambdas == 'true' }}
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: cloud-storage-lambdas-${{ matrix.service }}-${{ github.sha }}
          path: lambda-artifacts.tar.gz
          retention-days: 7

  deploy-services:
    name: Deploy ${{ matrix.service }}
    needs: [parse-services, build-lambda-artifacts]
    runs-on:
      [
        runs-on,
        runner=8cpu-linux-x64,
        hdd=40,
        spot=false,
        ssh=false,
        'run-id=${{github.run_id}}',
      ]
    strategy:
      fail-fast: false
      max-parallel: 20  # Limit concurrent deployments
      matrix:
        service: ${{ fromJson(needs.parse-services.outputs.matrix) }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Get project name
        id: project-name
        uses: ./.github/actions/get-project-name
        with:
          service-name: ${{ matrix.service }}

      - name: Check artifact config
        id: check-artifacts
        env:
          SERVICE: ${{ matrix.service }}
        run: |
          has_lambdas=$(jq -r --arg service "$SERVICE" '((.services[$service].deploy_lambdas // []) | length) > 0' .github/services-config.json)
          echo "has_lambdas=$has_lambdas" >> "$GITHUB_OUTPUT"

      - name: Deploy ${{ matrix.service }}
        uses: ./.github/actions/deploy-cloud-storage-pulumi
        with:
          environment: ${{ inputs.environment }}
          aws-access-key: ${{ secrets.AWS_ACCESS_KEY }}
          aws-secret-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          pulumi-access-token: ${{ secrets.PULUMI_ACCESS_TOKEN }}
          pulumi-service-name: ${{ steps.project-name.outputs.project-name }}
          lambda-artifacts: ${{ steps.check-artifacts.outputs.has_lambdas == 'true' && format('cloud-storage-lambdas-{0}-{1}', matrix.service, github.sha) || '' }}
          dd-app-key: ${{ secrets.DD_APP_KEY }}
          dd-api-key: ${{ secrets.DD_API_KEY }}

  summary:
    name: Deployment Summary
    runs-on: ubuntu-latest
    needs: [parse-services, build-lambda-artifacts, deploy-services]
    if: always()
    steps:
      - name: Report results
        run: |
          if [[ "${{ needs.parse-services.result }}" == "failure" ]]; then
            echo "❌ Failed to parse services"
            exit 1
          elif [[ "${{ needs.build-lambda-artifacts.result }}" == "failure" ]]; then
            echo "❌ One or more Lambda artifact builds failed"
            exit 1
          elif [[ "${{ needs.deploy-services.result }}" == "failure" ]]; then
            echo "❌ One or more deployments failed"
            exit 1
          else
            echo "✅ All requested services deployed successfully to ${{ inputs.environment }}"
          fi
