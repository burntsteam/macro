name: Deploy Service (Generic)
on:
  workflow_dispatch:
    inputs:
      service:
        type: choice
        required: true
        description: Select the service to deploy
        options:
          - authentication-service
          - bulk-upload
          - connection-gateway
          - contacts-service
          - convert-service
          - delete-document-worker
          - deleted-item-poller
          - dlp-handler
          - document-cognition-service
          - document-storage
          - document-storage-bucket-integrations
          - document-storage-service
          - document-text-extractor
          - email-service
          - email-suppression
          - lambda-aggregate-frecency
          - link-sharing
          - notification-service
          - organization-retention
          - search-processing-service
          - search-upload
          - static-file-service
          - unfurl-service
          - opensearch
          - search-event-queue
          - search-text-extractor-queue
      environment:
        type: choice
        required: true
        default: 'dev'
        options:
          - dev
          - prod
        description: The environment to deploy to

concurrency:
  group: deploy-${{ inputs.service }}-${{ inputs.environment }}
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy ${{ inputs.service }}
    uses: ./.github/workflows/reusable-deploy-service.yml
    with:
      environment: ${{ inputs.environment }}
      service-name: ${{ inputs.service }}
    secrets: inherit
