<style>
  @font-face {
    font-family: "Forma Macro";
    src: url("/fonts/FormaMacroVariable.woff2") format("woff2");

    font-style: oblique 0deg 13deg;
    font-feature-settings: "ss17" on, "calt", "liga", "rlig", "rvrn", "kern", "rclt";

    font-display: swap;
    /* ascent-override: 100%; No longer needed but keeping just in case */
  }

    font-family: "Forma Macro Mono";
    src: url("/fonts/FormaMacroMonoVariable.woff2") format("woff2");

    font-display: swap;
    font-feature-settings: "ss11" on, "ss19" on, "calt", "liga", "rlig", "rvrn", "kern", "rclt";

  .sidebar-header img {
    height: 2rem;
  }

  .docblock-argstable textarea,
  .docblock-argstable input:not([type="range"]):not([type="checkbox"]) {

  .docblock-argstable label:has(input[role="switch"]) span {
    color: #888 !important;
