[package]
authors = ["you"]
description = "A Tauri App"
edition.workspace = true
license = ""
name = "app"
repository = ""
version = "0.1.0"

# See more keys and their definitions at https://doc.rust-lang.org/cargo/reference/manifest.html

[lib]
crate-type = ["cdylib", "rlib", "staticlib"]
name = "app_lib"

[build-dependencies]
tauri-build = { version = "2.3.1", features = [] }

[features]
default = []

[dependencies]
http = "1"
log = "0.4"
logger = { path = "../logger" }
mime_guess = "2"
rootcause = { workspace = true }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
tracing-oslog = { version = "0.3" }

nom = "8.0.0"
reqwest = { workspace = true, features = [
  "cookies",
] }
serde_qs = "0.15.0"
tauri = { workspace = true, features = [] }
tauri-plugin-deep-link = "=2.4.5"
tauri-plugin-http = { git = "https://github.com/seanaye/plugins-workspace", branch = "seanaye/feat/websocket-cookies", features = ["unsafe-headers"] }
tauri-plugin-log = { version = "2", features = ["tracing"] }
tauri-plugin-opener = "2"
tauri-plugin-safe-area-insets = "0.1.0"
tauri-plugin-websocket = { git = "https://github.com/seanaye/plugins-workspace", branch = "seanaye/feat/websocket-cookies" }
thiserror = "2.0.14"
tokio = { version = "1.47.1", features = ["full"] }
tracing = { workspace = true }
tracing-subscriber = { version = "0.3.20", features = ["env-filter"] }
url = { workspace = true }
urlencoding = "2.1.3"
# system notifications for when the app is open
tauri-plugin-notification = "2"
# push notifications for mobile (when app is closed)
macro_bundle_updater_plugin = { path = "../macro_bundle_updater_plugin" }
navigation_plugin = { path = "../navigation_plugin" }
tauri-plugin-notifications = { git = "https://github.com/macro-inc/tauri-plugins", rev = "61520093d5c7fcd60a2ed354dc150ca9556519a4" }
tauri-plugin-os = "2"
tauri-plugin-virtual-keyboard = { git = "https://github.com/voxelbee/tauri-plugin-virtual-keyboard", branch = "main" }


[target."cfg(any(target_os = \"macos\", windows, target_os = \"linux\"))".dependencies]
tauri-plugin-single-instance = { version = "2", features = ["deep-link"] }

[target.'cfg(any(target_os = "android", target_os = "ios"))'.dependencies]
tauri-plugin-haptics = "2"
tauri-plugin-auth = { git = "https://github.com/macro-inc/tauri-plugins", rev = "61520093d5c7fcd60a2ed354dc150ca9556519a4" }

[target.'cfg(target_os = "ios")'.dependencies]
tauri-plugin-input-accessory = { path = "../input_accessory_plugin" }
