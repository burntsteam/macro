[package]
edition = "2024"
name = "entity_access"
publish = false
version = "0.1.0"

[features]
axum = [
  "dep:axum",
  "dep:axum-extra",
  "dep:model",
  "dep:model-error-response",
  "dep:model_user",
]
default = ["axum", "inbound", "outbound", "ports"]
inbound = ["axum", "ports"]
outbound = ["dep:cached", "ports"]
ports = ["dep:tokio"]
schema = ["dep:utoipa"]

[dependencies]
# Core
anyhow = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
thiserror = { workspace = true }
tracing = { workspace = true }
uuid = { workspace = true }

# Domain models (always included)
macro_user_id = { path = "../macro_user_id" }
model-entity = { path = "../model-entity" }
models_permissions = { path = "../models_permissions" }

# Async runtime (for ports)
tokio = { workspace = true, optional = true }

# Axum dependencies (for inbound)
axum = { workspace = true, optional = true }
axum-extra = { workspace = true, optional = true }
model = { path = "../model", optional = true }
model-error-response = { path = "../model-error-response", optional = true }
model_user = { path = "../model_user", optional = true, features = ["axum"] }

# OpenAPI schema (optional)
utoipa = { workspace = true, optional = true }

# Database
cached = { workspace = true, optional = true }
sqlx = { workspace = true }

[dev-dependencies]
cool_asserts = "2"
macro_db_migrator = { path = "../macro_db_migrator" }
mockall = { workspace = true }
sqlx = { workspace = true, features = ["postgres", "runtime-tokio-rustls"] }
tokio = { workspace = true, features = ["macros", "rt-multi-thread"] }
