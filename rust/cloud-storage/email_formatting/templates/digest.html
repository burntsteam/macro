<div
  style="
    padding: 60px 20px;
    width: 100%;
  "
>
  <div
    style="
      font-family: 'Berkeley Mono', 'Courier New', Courier, monospace;
      background-color: #111;
      border: 1px solid #444;
      box-sizing: border-box;
      border-radius: 4px;
      max-width: 570px;
      font-size: 15px;
      margin: 0 auto;
      color: #999;
      width: 100%;
    "
  >
    <div
      style="
        background-color: #222;
        box-sizing: border-box;
        line-height: 60px;
        font-size: 17px;
        padding: 0 20px;
        height: 60px;
        width: 100%;
      "
    >
      <div
        style="
          border: 1px solid #444;
          vertical-align: middle;
          box-sizing: border-box;
          display: inline-block;
          border-radius: 20px;
          margin-right: 10px;
          height: 40px;
          width: 40px;
        "
      >
        <!--<SvgNotification/>-->
      </div>
      You have {{ notifs.len() }} unread messages
    </div>
    <hr
      style="
        border-top: 1px dashed #444;
        border-bottom: none;
        border-right: none;
        border-left: none;
        margin: 0;
      "
    />
    <div
      style="
        box-sizing: border-box;
        padding: 0 20px;
      "
    >
      {% for notif in notifs %}
      <a
        style="
          text-decoration: none;
          padding: 10px 17px;
          color: #999;
          display: block;
        "
        href="https://macro.com"
        target="_blank"
      >
        <div
          style="
            background-color: #f038;
            border: 1px solid #f03;
            box-sizing: border-box;
            display: inline-block;
            border-radius: 100%;
            margin-right: 10px;
            height: 8px;
            width: 8px;
          "
        >
        </div>
        {{ notif.created_at.format("%Y-%m-%d %H:%M:%S") }} {{ notif.message }}
      </a>
      {% if !loop.last %}
      <hr
        style="
          border-top: 1px dashed #333;
          border-bottom: none;
          border-right: none;
          border-left: none;
          margin: 0;
        "
      />
      {% endif %}
      {% endfor %}

      <hr
        style="
          border-top: 1px dashed #333;
          border-bottom: none;
          border-right: none;
          border-left: none;
          margin: 0;
        "
      />

      <table style="width: 100%; cellpadding: 0; border: none;">
        <tbody>
        <tr>
          <td
            style="
              vertical-align: middle;
              padding: 0;
              width: 50%;
            "
          >
            <a
              style="
                background-color: #f04;
                text-decoration: none;
                display: inline-block;
                white-space: nowrap;
                width: min-content;
                padding: 2px 10px;
                color: #111;
              "
              href="https://macro.com"
              target="_blank"
            >
              View in Macro
            </a>
          </td>
          <td
            style="
              text-align: right;
              padding: 0;
              width: 50%;
            "
          >
            <!--<SvgLogo/>-->
          </td>
        </tr>
        </tbody>
      </table>
    </div>
  </div>
</div>
