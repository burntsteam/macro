[package]
edition = "2024"
name = "mcp_auth_proxy"
publish = false
readme = "README.md"
version = "0.1.0"

[features]
default = ["inbound", "outbound"]
inbound = [
  "dep:axum",
  "dep:macro_auth",
  "dep:macro_user_id",
  "dep:tower",
  "dep:tower-http",
]
outbound = ["dep:fusionauth"]

[dependencies]
anyhow = { workspace = true }
axum = { workspace = true, features = ["tower-log"], optional = true }
base64 = { workspace = true }
fusionauth = { path = "../fusionauth", optional = true }
macro_auth = { path = "../macro_auth", optional = true }
macro_user_id = { path = "../macro_user_id", optional = true }
redis = { workspace = true, features = ["aio", "tokio-comp"] }
serde = { workspace = true }
serde_json = { workspace = true }
sha2 = { workspace = true }
thiserror = { workspace = true }
tower = { workspace = true, features = ["util"], optional = true }
tower-http = { workspace = true, optional = true }
tracing = { workspace = true }
url = { workspace = true }
urlencoding = { workspace = true }
uuid = { workspace = true }
