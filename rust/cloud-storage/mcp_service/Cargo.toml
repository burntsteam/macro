[package]
default-run = "mcp_service"
edition = "2024"
name = "mcp_service"
publish = false
version = "0.1.0"

[dependencies]
ai_tools = { path = "../ai_tools" }
ai_toolset = { path = "../ai_toolset" }
anyhow = { workspace = true }
aws-sdk-secretsmanager = { workspace = true }
aws-sdk-sqs = { workspace = true }
axum = { workspace = true, features = ["tower-log"] }
call = { path = "../call", default-features = false, features = ["ports"] }
chat = { path = "../chat", features = ["ai_tools", "outbound"] }
comms = { path = "../comms", features = ["outbound"] }
crm = { path = "../crm" }
documents = { path = "../documents", features = ["ai_tools"] }
email = { path = "../email", features = ["outbound"] }
email_service_client = { path = "../email_service_client" }
entity_access = { path = "../entity_access" }
entity_access_management = { path = "../entity_access_management" }
foreign_entity = { path = "../foreign_entity" }
frecency = { path = "../frecency", features = ["outbound", "postgres"] }
fusionauth = { path = "../fusionauth" }
http = { workspace = true }
lexical_client = { path = "../lexical_client" }
mcp_auth_proxy = { path = "../mcp_auth_proxy" }
macro_auth = { path = "../macro_auth" }
macro_db_client = { path = "../macro_db_client" }
macro_aws_config = { path = "../macro_aws_config", features = ["s3"] }
macro_entrypoint = { path = "../macro_entrypoint" }
macro_env = { path = "../macro_env" }
macro_env_var = { path = "../macro_env_var" }
macro_middleware = { path = "../macro_middleware", default-features = false, features = [
  "auth",
  "cloud_storage",
  "user_permissions",
] }
macro_user_id = { path = "../macro_user_id" }
notification = { path = "../notification", features = ["ai_tool"] }
properties = { path = "../properties", features = ["ai_tools"] }
readonly_pool = { path = "../readonly_pool" }
redis = { workspace = true, features = ["aio", "tokio-comp"] }
roles_and_permissions = { path = "../roles_and_permissions" }
rmcp = { workspace = true, features = ["transport-streamable-http-server"] }
search_service_client = { path = "../search_service_client" }
secretsmanager_client = { path = "../secretsmanager_client" }
serde_json = { workspace = true }
soup = { path = "../soup", features = ["outbound"] }
sqlx = { workspace = true }
sqs_client = { path = "../sqs_client", default-features = false, features = [
  "chat",
  "document_text_extractor",
  "email",
  "gmail",
  "search",
] }
sync_service_client = { path = "../sync_service_client" }
tokio = { workspace = true }
tracing = { workspace = true }

macro_service_urls = { path = "../macro_service_urls" }
