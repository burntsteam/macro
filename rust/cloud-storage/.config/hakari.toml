# This file contains settings for `cargo hakari`.
# See https://docs.rs/cargo-hakari/latest/cargo_hakari/config for a full list of options.

hakari-package = "workspace-hack"

# Format version for hakari's output. Version 4 requires cargo-hakari 0.9.22 or above.
dep-format-version = "4"

# Setting workspace.resolver = "2" or higher in the root Cargo.toml is HIGHLY recommended.
# Hakari works much better with the v2 resolver. (The v2 and v3 resolvers are identical from
# hakari's perspective, so you're welcome to set either.)
#
# For more about the new feature resolver, see:
# https://blog.rust-lang.org/2021/03/25/Rust-1.51.0.html#cargos-new-feature-resolver
resolver = "2"

# Add triples corresponding to platforms commonly used by developers here.
# https://doc.rust-lang.org/rustc/platform-support.html
#
# x86_64-unknown-linux-gnu is what CI builds (service binaries and, via
# cargo-zigbuild's plain-triple passthrough, the lambdas); aarch64-apple-darwin
# covers local dev. Unifying on these platforms is what makes the solo
# per-service/per-lambda builds fingerprint-match the union-built crane dep
# layers (deployCargoArtifacts / lambdaDeployCargoArtifacts), so the warm dep
# caches actually hit instead of silently recompiling shared deps.
platforms = [
    "x86_64-unknown-linux-gnu",
    "aarch64-apple-darwin",
]

# Write out exact versions rather than a semver range. (Defaults to false.)
# exact-versions = true

# The xtask is a dev-only automation tool (it *runs* hakari); folding its
# dependencies (guppy, hakari, ...) into workspace-hack would drag them into
# the deploy dependency layers that every service build warms. Excluding it
# also means manage-deps does not add the workspace-hack dep to it.
[traversal-excludes]
workspace-members = ["xtask"]
