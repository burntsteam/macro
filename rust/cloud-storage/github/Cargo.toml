[package]
edition = "2024"
name = "github"
publish = false
version = "0.1.0"

[features]
axum = ["dep:axum", "dep:axum-extra", "dep:model-error-response", "dep:utoipa"]
default = ["axum", "inbound", "link", "outbound", "ports", "sync"]
inbound = ["axum", "ports"]
link = ["dep:entity_access", "dep:foreign_entity", "ports"]
outbound = [
  "dep:fusionauth",
  "dep:redis",
  "dep:reqwest",
  "dep:sqlx",
  "dep:tokio",
  "dep:urlencoding",
  "ports",
]
ports = []
sync = [
  "dep:documents",
  "dep:entity_access",
  "dep:foreign_entity",
  "dep:model-entity",
  "dep:model_notifications",
  "dep:notification",
  "dep:reqwest",
  "ports",
]

[dependencies]
anyhow = { workspace = true }
chrono = { workspace = true }
documents = { path = "../documents", default-features = false, features = [
  "ports",
], optional = true }
entity_access = { path = "../entity_access", default-features = false, features = [
  "ports",
], optional = true }
foreign_entity = { path = "../foreign_entity", default-features = false, features = [
  "ports",
], optional = true }
hex = { workspace = true }
hmac = { workspace = true }
jsonwebtoken = { workspace = true }
macro_env = { path = "../macro_env" }
macro_service_urls = { path = "../macro_service_urls" }
model-entity = { path = "../model-entity", optional = true }
model_notifications = { path = "../model_notifications", optional = true }
notification = { path = "../notification", optional = true }
regex = { workspace = true }
reqwest = { workspace = true, optional = true }
serde = { workspace = true }
serde_json = { workspace = true }
sha2 = { workspace = true }
sqlx = { workspace = true, optional = true }
subtle = "2.6.1"
thiserror = { workspace = true }
tracing = { workspace = true }
urlencoding = { workspace = true, optional = true }
uuid = { workspace = true }

fusionauth = { path = "../fusionauth", optional = true }
macro_user_id = { path = "../macro_user_id" }
macro_uuid = { path = "../macro_uuid" }
redis = { workspace = true, features = ["aio", "tokio-comp"], optional = true }
tokio = { workspace = true, features = ["sync"], optional = true }

axum = { workspace = true, optional = true }
axum-extra = { workspace = true, optional = true }
model-error-response = { path = "../model-error-response", optional = true }
utoipa = { workspace = true, optional = true }

[dev-dependencies]
document_sub_type = { path = "../document_sub_type" }
http-body-util = { workspace = true }
macro_db_migrator = { path = "../macro_db_migrator" }
mockall = { workspace = true }
model = { path = "../model" }
models_permissions = { path = "../models_permissions" }
rootcause = { workspace = true }
tokio = { workspace = true }
tower = { workspace = true }
