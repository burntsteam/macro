[package]
edition = "2024"
name = "notification"
publish = false
version = "0.1.0"


[features]
ai_tool = ["dep:ai_toolset", "dep:anyhow", "dep:async-trait", "dep:schemars"]
axum = [
  "dep:axum",
  "dep:model-error-response",
  "dep:model_user",
  "models_pagination/axum",
  "schema",
]
docs = ["dep:aquamarine"]
redis-tests = []
schema = ["dep:utoipa", "macro_user_id/schema"]

[dependencies]
ai_toolset = { path = "../ai_toolset", optional = true }
anyhow = { workspace = true, optional = true }
aquamarine = { version = "0.6", optional = true }
async-trait = { workspace = true, optional = true }
aws-sdk-sesv2 = { workspace = true }
aws-sdk-sns = { workspace = true }
aws-sdk-sqs = { workspace = true }
axum = { workspace = true, optional = true }
chrono = { workspace = true }
cowlike = { path = "../cowlike" }
decode_jwt = { path = "../decode_jwt" }
either = { workspace = true }
futures = { workspace = true }
hex = { workspace = true }
hmac = { workspace = true }
itertools = { workspace = true }
last_online_tracker = { path = "../last_online_tracker" }
macro_auth = { path = "../macro_auth" }
macro_env = { path = "../macro_env" }
macro_service_urls = { path = "../macro_service_urls" }
macro_user_id = { path = "../macro_user_id" }
macro_uuid = { path = "../macro_uuid" }
model-entity = { path = "../model-entity" }
model-error-response = { path = "../model-error-response", optional = true }
model_user = { path = "../model_user", optional = true, features = ["axum"] }
models_pagination = { path = "../models_pagination" }
rate_limit = { path = "../rate_limit" }
redis = { workspace = true, features = [
  "aio",
  "tokio-comp",
  "tokio-rustls-comp",
] }
reqwest = { workspace = true }
rootcause = { workspace = true }
schemars = { workspace = true, optional = true }
serde = { workspace = true }
serde_json = { workspace = true }
sha2 = { workspace = true }
sqlx = { workspace = true }
strum = { workspace = true }
thiserror = { workspace = true }
tokio = { workspace = true, features = ["time"] }
tracing = { workspace = true }
url = { workspace = true }
utoipa = { workspace = true, optional = true }
uuid = { workspace = true }

[dev-dependencies]
http-body-util = { workspace = true }
macro_auth = { path = "../macro_auth", features = ["testing"] }
macro_db_migrator = { path = "../macro_db_migrator" }
rate_limit = { path = "../rate_limit", features = ["testing"] }
tokio = { workspace = true, features = ["macros", "rt", "test-util"] }
tower = { workspace = true }
