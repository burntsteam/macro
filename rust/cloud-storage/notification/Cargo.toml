[package]
edition = "2024"
name = "notification"
publish = false
version = "0.1.0"


[features]
ai_tool = ["dep:ai", "dep:anyhow", "dep:async-trait", "dep:schemars"]
axum = [
  "dep:axum",
  "dep:model-error-response",
  "dep:model_user",
  "models_pagination/axum",
  "schema",
]
docs = ["dep:aquamarine"]
redis-tests = []
schema = ["dep:utoipa"]

[dependencies]
ai = { path = "../ai", optional = true }
anyhow = { workspace = true, optional = true }
aquamarine = { version = "0.6", optional = true }
async-trait = { workspace = true, optional = true }
aws-sdk-sesv2 = { workspace = true }
aws-sdk-sns = { workspace = true }
aws-sdk-sqs = { workspace = true }
axum = { workspace = true, optional = true }
chrono = { workspace = true }
cowlike = { path = "../cowlike" }
either = { workspace = true }
hex = { workspace = true }
itertools = { workspace = true }
macro_user_id = { path = "../macro_user_id" }
model-entity = { path = "../model-entity" }
model-error-response = { path = "../model-error-response", optional = true }
model_user = { path = "../model_user", optional = true, features = ["axum"] }
models_pagination = { path = "../models_pagination" }
redis = { workspace = true, features = [
  "aio",
  "tokio-comp",
  "tokio-native-tls-comp",
] }
reqwest = { workspace = true }
rootcause = { workspace = true }
schemars = { workspace = true, optional = true }
serde = { workspace = true }
serde_json = { workspace = true }
sha2 = { workspace = true }
sqlx = { workspace = true }
thiserror = { workspace = true }
tokio = { workspace = true, features = ["time"] }
tracing = { workspace = true }
utoipa = { workspace = true, optional = true }
uuid = { workspace = true }

[dev-dependencies]
macro_db_migrator = { path = "../macro_db_migrator" }
tokio = { workspace = true, features = ["macros", "rt"] }
