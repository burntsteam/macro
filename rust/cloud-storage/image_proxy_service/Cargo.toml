[package]
edition = "2024"
name = "image_proxy_service"
publish = false
version = "0.1.0"
default-run = "image_proxy_service"

[[bin]]
name = "image_proxy_service"
path = "src/main.rs"

[[bin]]
name = "image_proxy_service_openapi"
path = "src/openapi.rs"

[[bin]]
name = "image_proxy_service_doppler_config"
path = "src/doppler_config.rs"

[dependencies]
anyhow = { workspace = true }
aws-sdk-secretsmanager = { workspace = true }
axum = { workspace = true, features = ["macros"] }
doppler-config = { workspace = true }
macro_auth = { path = "../macro_auth" }
macro_aws_config = { path = "../macro_aws_config" }
macro_config = { path = "../macro_config" }
macro_cors = { path = "../macro_cors" }
macro_entrypoint = { path = "../macro_entrypoint" }
macro_env = { path = "../macro_env" }
macro_middleware = { path = "../macro_middleware", default-features = false, features = [
  "auth",
  "tracking",
] }
model = { path = "../model" }
bytes = { workspace = true }
futures = { workspace = true }
reqwest = { workspace = true, features = ["stream"] }
url = { workspace = true }
secretsmanager_client = { path = "../secretsmanager_client" }
serde = { workspace = true }
serde_json = { workspace = true }
tokio = { workspace = true }
tower = { workspace = true }
tower-http = { workspace = true }
tracing = { workspace = true }
utoipa = { workspace = true, features = ["axum_extras", "chrono", "uuid"] }
utoipa-swagger-ui = { workspace = true, features = ["axum"] }
workspace-hack = { version = "0.1", path = "../workspace-hack" }

[dev-dependencies]
http-body-util = { workspace = true }
