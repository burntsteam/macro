[package]
edition = "2024"
name = "email"
publish = false
version = "0.1.0"

[features]
all = [
  "ai_tools",
  "gmail_token",
  "inbound",
  "outbound",
  "ports",
]
attachment = [
  "dep:attachment",
  "dep:non_empty",
  "ports",
]
ai_schema = ["dep:schemars"]
ai_tools = [
  "dep:ai",
  "dep:async-trait",
  "dep:schemars",
  "ports",
]
axum = [
  "dep:axum",
  "dep:axum-extra",
  "dep:model-error-response",
  "dep:model_user",
  "dep:utoipa",
  "model_user/axum",
  "models_pagination/axum",
]
gmail_token = ["dep:authentication_service_client", "dep:gmail_client", "dep:redis", "ports"]
inbound = ["ports"]
outbound = ["dep:sqlx", "ports"]
ports = ["dep:tokio", "frecency/ports"]

[dependencies]
ai = { path = "../ai", optional = true }
attachment = { path = "../attachment", optional = true }
anyhow = { workspace = true }
async-trait = { workspace = true, optional = true }
base64 = { workspace = true }
entity_access = { path = "../entity_access" }
futures = { workspace = true }
axum = { workspace = true, optional = true }
axum-extra = { workspace = true, optional = true }
chrono = { workspace = true, features = ["serde"] }
doppleganger = { workspace = true, features = ["chrono", "uuid"] }
either = { workspace = true }
email_utils = { path = "../email_utils" }
filter_ast = { path = "../filter_ast" }
frecency = { path = "../frecency" }
gmail_client = { path = "../gmail_client", optional = true }
item_filters = { path = "../item_filters" }
macro_user_id = { path = "../macro_user_id" }
macro_uuid = { path = "../macro_uuid" }
model-entity = { path = "../model-entity" }
non_empty = { path = "../non_empty", optional = true }
model-error-response = { path = "../model-error-response", optional = true }
model_user = { path = "../model_user", optional = true }
models_grouping = { path = "../models_grouping" }
models_pagination = { path = "../models_pagination" }
recursion = { workspace = true }
schemars = { workspace = true, optional = true, features = ["uuid1"] }
serde = { workspace = true }
serde_json = { workspace = true }
serde_with = { workspace = true }
authentication_service_client = { path = "../authentication_service_client", optional = true }
redis = { workspace = true, features = ["tokio-rustls-comp"], optional = true }
sqlx = { workspace = true, optional = true }
strum = { workspace = true }
thiserror = { workspace = true }
tokio = { workspace = true, features = ["macros"], optional = true }
tracing = { workspace = true }
utoipa = { workspace = true, optional = true }
uuid = { workspace = true }

[dev-dependencies]
frecency = { path = "../frecency", features = ["outbound", "postgres"] }
macro_db_migrator = { path = "../macro_db_migrator" }
serde_json = { workspace = true }
tracing-subscriber = { workspace = true, features = ["env-filter"] }

[[example]]
name = "ai_tools_cli"
required-features = ["all"]
