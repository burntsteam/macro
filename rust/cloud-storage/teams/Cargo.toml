[package]
edition = "2024"
name = "teams"
publish = false
version = "0.1.0"

[features]
ai_tools = [
  "dep:ai_toolset",
  "dep:async-trait",
  "dep:schemars",
  "entity_access/ports",
  "ports",
]
axum = [
  "dep:axum",
  "dep:model-error-response",
  "dep:model_user",
  "dep:utoipa",
  "entity_access/axum",
  "entity_access/inbound",
  "entity_access/ports",
]
default = ["ai_tools", "axum", "inbound", "outbound", "ports"]
inbound = ["axum", "ports"]
outbound = [
  "dep:sqlx",
  "dep:sqs_client",
  "dep:models_email",
  "dep:url",
  "ports",
]
ports = [
  "dep:model-entity",
  "dep:model_notifications",
  "dep:notification",
  "dep:tokio",
]

[dependencies]
# Core
ai_toolset = { path = "../ai_toolset", optional = true }
anyhow = { workspace = true }
async-stripe = { workspace = true, default-features = false, features = [
  "billing",
  "checkout",
  "runtime-tokio-hyper-rustls-webpki",
] }
async-trait = { workspace = true, optional = true }
chrono = { workspace = true }
macro_user_id = { path = "../macro_user_id" }
macro_uuid = { path = "../macro_uuid" }
non_empty = { path = "../non_empty" }
roles_and_permissions = { path = "../roles_and_permissions", default-features = false, features = [
  "ports",
] }
schemars = { workspace = true, optional = true }
serde = { workspace = true }
thiserror = { workspace = true }
tracing = { workspace = true }
uuid = { workspace = true }

entity_access = { path = "../entity_access", default-features = false }

# Async runtime (for ports)
tokio = { workspace = true, optional = true }

# Axum dependencies (for inbound)
axum = { workspace = true, optional = true }
model-error-response = { path = "../model-error-response", optional = true }
model_user = { path = "../model_user", optional = true, features = ["axum"] }
utoipa = { workspace = true, optional = true }

# Notification dependencies (for ports)
model-entity = { path = "../model-entity", optional = true }
model_notifications = { path = "../model_notifications", optional = true }
notification = { path = "../notification", optional = true, default-features = false }

# Outbound dependencies
sqlx = { workspace = true, optional = true }
url = { workspace = true, optional = true }
sqs_client = { path = "../sqs_client", default-features = false, features = [
  "email",
], optional = true }
models_email = { path = "../models_email", optional = true }
workspace-hack = { version = "0.1", path = "../workspace-hack" }

[dev-dependencies]
macro_db_migrator = { path = "../macro_db_migrator" }
rootcause = { workspace = true }
serde_json = { workspace = true }
tokio = { workspace = true }
