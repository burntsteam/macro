<!DOCTYPE html>
<html lang="en" xmlns:v="urn:schemas-microsoft-com:vml">
<head>
  <meta charset="utf-8" />
  <meta name="x-apple-disable-message-reformatting" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta
    name="format-detection"
    content="telephone=no, date=no, address=no, email=no"
  />
  <meta name="color-scheme" content="dark" />
  <meta name="supported-color-schemes" content="dark" />
  <title>Welcome to Macro</title>
  <!--[if mso]><style>body{font-family:Helvetica,Arial,sans-serif}</style><![endif]-->
</head>

<body>
<div
  role="article"
  aria-roledescription="email"
  aria-label="Welcome to Macro"
  lang="en"
  style="background-color: #030303; width: 100%; font-family: 'Rajdhani', Helvetica, Arial, sans-serif"
>
  <table
    cellpadding="0"
    cellspacing="0"
    role="presentation"
    style="width: 100%; max-width: 640px; margin: 0 auto; background-color: #030303"
  >
    <tr>
      <td align="center" style="padding: 56px 0 32px">
        <a href="https://macro.com">
          <img
            src="https://macro.com/logo-256px.png"
            width="128"
            alt="Macro"
            style="border: 0; max-width: 100%"
          />
        </a>
      </td>
    </tr>
    <tr>
      <td>
        <div style="background-color: #090909; border-radius: 5px; padding: 56px 40px; margin: 0 16px; border: 1px solid #484848">
          <h1
            style="
                    margin: 0 0 16px;
                    text-align: center;
                    font-size: 36px;
                    font-weight: 450;
                    font-family: 'Roboto Slab', Rockwell, Georgia, serif;
                    letter-spacing: -0.02em;
                    color: #f2f2f2;
                  "
          >
            You're in.
          </h1>
          <p
            style="
                    margin: 0;
                    text-align: center;
                    font-size: 16px;
                    color: #aeaeae;
                    font-family: 'Rajdhani', Helvetica, Arial, sans-serif;
                  "
          >
            Tap below from your computer to get started.
          </p>
          <div style="text-align: center; margin: 56px 0">
            <a
              href="https://macro.com/app/welcome"
              style="
                      display: inline-block;
                      background-color: #ff8f00;
                      color: #090909;
                      text-decoration: none;
                      padding: 16px 32px;
                      border-radius: 3px;
                      font-size: 16px;
                      font-family: 'Rajdhani', Helvetica, Arial, sans-serif;
                      font-weight: 600;
                    "
            >
              Launch Macro
            </a>
          </div>
          <!--[if mso]>
          <table cellpadding="0" cellspacing="0" role="presentation" style="margin: 56px auto;">
            <tr>
              <td style="background-color: #ff8f00; border-radius: 3px;">
                <a href="https://macro.com/app/welcome" style="color: #090909; text-decoration: none; display: block; padding: 16px 32px; font-size: 16px; font-weight: 600; font-family: 'Rajdhani', Helvetica, Arial, sans-serif;">
                  Launch Macro
                </a>
              </td>
            </tr>
          </table>
          <![endif]-->
        </div>
      </td>
    </tr>
    <tr>
      <td style="padding: 48px 0; text-align: center">
        <p
          style="
                  margin: 0;
                  font-size: 14px;
                  color: #484848;
                  font-family: 'Rajdhani', Helvetica, Arial, sans-serif;
                "
        >
          Questions? Email us at
          <a
            href="mailto:support@macro.com"
            style="color: #aeaeae; text-decoration: none"
          >support@macro.com</a
          >
        </p>
      </td>
    </tr>
  </table>
</div>

</html>
