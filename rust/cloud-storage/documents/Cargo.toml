[package]
edition = "2024"
name = "documents"
publish = false
version = "0.1.0"

[features]
default = ["ports", "inbound", "outbound", "axum", "ai_tools"]
ports = ["dep:tokio"]
inbound = ["axum", "ports"]
outbound = ["ports", "dep:aws-sdk-s3", "dep:base64", "dep:hex"]
ai_tools = [
    "dep:ai",
    "dep:async-trait",
    "dep:schemars",
    "dep:lexical_client",
    "dep:model_file_type",
    "dep:reqwest",
    "dep:sha2",
    "ports",
    "outbound"
]
axum = [
    "dep:axum",
    "dep:axum-extra",
    "dep:model_user",
    "dep:model-error-response",
    "dep:utoipa",
    "entity_access/axum",
]

[dependencies]
# Core
anyhow = { workspace = true }
chrono = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
thiserror = { workspace = true }
tracing = { workspace = true }
uuid = { workspace = true }

# Domain models (always included)
document_sub_type = { path = "../document_sub_type" }
entity_access = { path = "../entity_access" }
macro_user_id = { path = "../macro_user_id" }
macro_uuid = { path = "../macro_uuid" }
model = { path = "../model" }
models_permissions = { path = "../models_permissions" }
macro_aws_config = { path = "../macro_aws_config", features = ["s3"] }

# Async runtime (for ports)
tokio = { workspace = true, optional = true }

# Axum dependencies (for inbound)
axum = { workspace = true, optional = true }
axum-extra = { workspace = true, optional = true }
model_user = { path = "../model_user", optional = true, features = ["axum"] }
model-error-response = { path = "../model-error-response", optional = true }
utoipa = { workspace = true, optional = true }

# Outbound dependencies
aws-sdk-s3 = { workspace = true, optional = true }
base64 = { workspace = true, optional = true }
cloudfront_sign = { workspace = true }
futures = { workspace = true }
hex = { workspace = true, optional = true }
macro_project_utils = { path = "../macro_project_utils" }
sqlx = { workspace = true }
sync_service_client = { path = "../sync_service_client" }
urlencoding = { workspace = true }

# AI Tool dependencies
ai = { path = "../ai", optional = true }
async-trait = { workspace = true, optional = true }
schemars = { workspace = true, optional = true }
lexical_client = { path = "../lexical_client", optional = true }
model_file_type = { path = "../model_file_type", optional = true }
reqwest = { workspace = true, optional = true }
sha2 = { workspace = true, optional = true }

[dev-dependencies]
http-body-util = { workspace = true }
macro_db_migrator = { path = "../macro_db_migrator" }
mockall = { workspace = true }
serde_json = { workspace = true }
tokio = { workspace = true, features = ["macros", "rt-multi-thread"] }
tower = { workspace = true }
dotenvy = { workspace = true }
