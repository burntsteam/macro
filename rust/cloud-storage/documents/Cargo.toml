[package]
edition = "2024"
name = "documents"
publish = false
version = "0.1.0"

[[bin]]
name = "backfill_markdown_content_location"
path = "src/bin/backfill_markdown_content_location.rs"
required-features = ["backfill_binary"]

[features]
attachment = [
    "dep:attachment",
    "dep:ai_toolset",
    "dep:lexical_client",
    "dep:model_file_type",
    "dep:reqwest",
    "ports",
]
ai_tools = [
  "dep:ai_toolset",
  "dep:async-trait",
  "dep:model_file_type",
  "dep:schemars",
  "dep:sha2",
  "document_create_adapters",
  "outbound",
  "ports",
]
axum = [
  "dep:axum",
  "dep:axum-extra",
  "dep:jsonwebtoken",
  "dep:lexical_client",
  "dep:model-error-response",
  "dep:model_user",
  "dep:task_dedup",
  "dep:utoipa",
  "entity_access/axum",
]
default = ["ai_tools", "axum", "inbound", "outbound", "ports", "service"]
document_create = [
  "dep:base64",
  "dep:sha2",
  "ports",
]
document_create_adapters = [
  "dep:reqwest",
  "document_create",
  "markdown_init",
]
backfill_binary = [
  "dep:clap",
  "dep:macro_entrypoint",
  "dep:macro_service_urls",
  "markdown_init",
  "outbound",
  "ports",
]
inbound = ["axum", "document_create_adapters", "ports"]
markdown_init = ["dep:lexical_client"]
outbound = [
  "dep:aws-sdk-s3",
  "dep:base64",
  "dep:entity_access_db_utils",
  "dep:hex",
  "dep:sqlx",
  "ports",
]
ports = ["dep:tokio"]
service = ["dep:entity_access_management", "dep:foreign_entity", "ports"]

[dependencies]
# Core
anyhow = { workspace = true }
chrono = { workspace = true }
clap = { workspace = true, optional = true }
serde = { workspace = true }
serde_json = { workspace = true }
thiserror = { workspace = true }
tracing = { workspace = true }
unicode-segmentation = { workspace = true }
uuid = { workspace = true }

# Domain models (always included)
connection = { path = "../connection", default-features = false, features = [
  "ports",
] }
document_sub_type = { path = "../document_sub_type" }
entity_access = { path = "../entity_access" }
entity_access_management = { path = "../entity_access_management", default-features = false, features = [
  "outbound",
  "ports",
], optional = true }
foreign_entity = { path = "../foreign_entity", default-features = false, features = [
  "ports",
], optional = true }
macro_aws_config = { path = "../macro_aws_config", features = ["s3"] }
macro_entrypoint = { path = "../macro_entrypoint", optional = true }
macro_env_var = { path = "../macro_env_var" }
macro_user_id = { path = "../macro_user_id" }
macro_uuid = { path = "../macro_uuid" }
model = { path = "../model" }
model-entity = { path = "../model-entity" }
models_permissions = { path = "../models_permissions" }
models_properties = { path = "../models_properties" }
s3_key = { path = "../s3_key" }
macro_service_urls = { path = "../macro_service_urls", optional = true }

# Async runtime (for ports)
tokio = { workspace = true, optional = true }

# Axum dependencies (for inbound)
axum = { workspace = true, optional = true }
jsonwebtoken = { workspace = true, optional = true }
axum-extra = { workspace = true, optional = true }
model-error-response = { path = "../model-error-response", optional = true }
model_user = { path = "../model_user", optional = true, features = ["axum"] }
utoipa = { workspace = true, optional = true }

# Outbound dependencies
aws-sdk-s3 = { workspace = true, optional = true }
base64 = { workspace = true, optional = true }
cloudfront_sign = { workspace = true }
entity_access_db_utils = { path = "../entity_access_db_utils", optional = true }
futures = { workspace = true }
hex = { workspace = true, optional = true }
sqlx = { workspace = true, optional = true }
sync_service_client = { path = "../sync_service_client" }
task_dedup = { path = "../task_dedup", optional = true }
urlencoding = { workspace = true }

# AI Tool dependencies
ai_toolset = { path = "../ai_toolset", optional = true }
async-trait = { workspace = true, optional = true }
lexical_client = { path = "../lexical_client", optional = true }
model_file_type = { path = "../model_file_type", optional = true }
reqwest = { workspace = true, optional = true }
schemars = { workspace = true, optional = true }
sha2 = { workspace = true, optional = true }

# Attachment
attachment = { path = "../attachment", optional = true }
non_empty = { path = "../non_empty" }
workspace-hack = { version = "0.1", path = "../workspace-hack" }

[dev-dependencies]
dotenvy = { workspace = true }
http-body-util = { workspace = true }
macro_db_migrator = { path = "../macro_db_migrator" }
mockall = { workspace = true }
serde_json = { workspace = true }
tokio = { workspace = true, features = ["macros", "rt-multi-thread"] }
tower = { workspace = true }
